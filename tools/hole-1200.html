<!doctype html>

<head>
  <meta charset="utf-8" />

  <title>板材孔位排版预览</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #172027;
      --panel: #222c34;
      --line: #f4f7fb;
      --dim: #00ff3c;
      --muted: #9aa7b2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #11181e;
      color: #edf3f7;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      display: flex;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
      padding: 16px 18px;
      background: #0f151a;
      border-bottom: 1px solid #2f3a43;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    input, select, button {
      height: 36px;
      border: 1px solid #3f4c56;
      border-radius: 6px;
      background: #1b242b;
      color: #edf3f7;
      padding: 0 10px;
      font: inherit;
    }
    input { width: 96px; }
    button {
      cursor: pointer;
      background: #0d6efd;
      border-color: #2e83ff;
      min-width: 92px;
    }
    main {
      min-width: 0;
      overflow: auto;
      padding: 18px;
    }
    .stage {
      width: min(1180px, 100%);
      margin: 0 auto;
      background: var(--bg);
      border: 1px solid #2f3a43;
      border-radius: 8px;
      overflow: hidden;
    }
    svg {
      display: block;
      width: 100%;
      height: auto;
      min-height: 560px;
    }
    .plate { fill: none; stroke: var(--line); stroke-width: 1.5; }
    .hole { fill: none; stroke: var(--line); stroke-width: 1.2; }
    .dim { fill: none; stroke: var(--dim); stroke-width: 1.2; vector-effect: non-scaling-stroke; }
    .dimText { fill: var(--dim); font: 24px Consolas, Menlo, monospace; }
    .smallText { fill: var(--dim); font: 22px Consolas, Menlo, monospace; }

<body>
  <header>
    <label>板宽 mm <input id="widthMm" type="number" min="1" value="1200"></label>
    <label>板高 mm <input id="heightMm" type="number" min="1" value="600"></label>
    <label>孔数 <input id="holes" type="number" min="1" max="80" value="6"></label>
    <label>孔径 mm <input id="diameter" type="number" min="1" value="40"></label>
    <label>列数 <input id="columns" type="number" min="1" max="20" value="3"></label>
    <label>横向边距 mm <input id="marginX" type="number" min="0" value="200"></label>
    <label>纵向边距 mm <input id="marginY" type="number" min="0" value="150"></label>
    <button id="downloadSvg">导出 SVG</button>
  </header>
  <main>
    <div class="stage">
      <svg id="svg" viewBox="0 0 1100 700" role="img" aria-label="板材孔位排版预览"></svg>
    </div>
  </main>

  <script>
    const svg = document.querySelector('#svg');
    const fields = ['widthMm', 'heightMm', 'holes', 'diameter', 'columns', 'marginX', 'marginY'];
    const ns = 'http://www.w3.org/2000/svg';

    function el(name, attrs = {}, text = '') {
      const node = document.createElementNS(ns, name);
      Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
      if (text) node.textContent = text;
      return node;
    }

    function line(parent, x1, y1, x2, y2, className = 'dim') {
      parent.append(el('line', { x1, y1, x2, y2, class: className }));
    }

    function text(parent, x, y, value, className = 'dimText', rotate = null, options = {}) {
      const attrs = {
        x,
        y,
        class: className,
        'text-anchor': options.anchor || 'start',
        'dominant-baseline': options.baseline || 'middle',
      };
      if (rotate !== null) attrs.transform = `rotate(${rotate} ${x} ${y})`;
      parent.append(el('text', attrs, value));
    }

    function getValue(id) {
      return Number(document.querySelector(`#${id}`).value);
    }

    function draw() {
      svg.replaceChildren();
      const widthMm = getValue('widthMm');
      const heightMm = getValue('heightMm');
      const holes = getValue('holes');
      const diameter = getValue('diameter');
      const columns = Math.min(getValue('columns'), holes);
      const rows = Math.ceil(holes / columns);
      const marginX = getValue('marginX');
      const marginY = getValue('marginY');

      const canvasW = 1100;
      const canvasH = 700;
      const left = 170;
      const top = 170;
      const maxW = 800;
      const maxH = 410;
      const scale = Math.min(maxW / widthMm, maxH / heightMm);
      const plateW = widthMm * scale;
      const plateH = heightMm * scale;
      const g = el('g', { transform: `translate(${left} ${top})` });
      svg.append(g);

      g.append(el('rect', { x: 0, y: 0, width: plateW, height: plateH, class: 'plate' }));

      const usableW = Math.max(0, widthMm - 2 * marginX);
      const usableH = Math.max(0, heightMm - 2 * marginY);
      const gapX = columns > 1 ? usableW / (columns - 1) : 0;
      const gapY = rows > 1 ? usableH / (rows - 1) : 0;
      const holeR = (diameter * scale) / 2;
      const points = [];

      for (let i = 0; i < holes; i += 1) {
        const col = i % columns;
        const row = Math.floor(i / columns);
        const rowCount = Math.min(columns, holes - row * columns);
        const offsetCols = rowCount < columns ? (columns - rowCount) / 2 : 0;
        const xMm = marginX + (col + offsetCols) * gapX;
        const yMm = rows > 1 ? marginY + row * gapY : heightMm / 2;
        points.push([xMm, yMm]);
        g.append(el('circle', {
          cx: xMm * scale,
          cy: yMm * scale,
          r: holeR,
          class: 'hole',
        }));
      }

      if (points.length > 0) {
        const [xMm, yMm] = points[0];
        const x = xMm * scale;
        const y = yMm * scale;
        line(g, x + holeR * 0.9, y + holeR * 0.9, x + 34, y + 62);
        text(g, x + 58, y + 67, `Ø${diameter}`, 'smallText');
      }

      line(g, 0, -130, plateW, -130);
      line(g, 0, -130, 0, -25);
      line(g, plateW, -130, plateW, -25);
      text(g, plateW / 2, -152, widthMm, 'dimText', null, { anchor: 'middle' });

      const chainY = -52;
      const xs = [0, ...[...new Set(points.map(([x]) => x))].sort((a, b) => a - b), widthMm];
      for (let i = 0; i < xs.length - 1; i += 1) {
        const x1 = xs[i] * scale;
        const x2 = xs[i + 1] * scale;
        line(g, x1, chainY, x2, chainY);
        line(g, x2, chainY - 18, x2, chainY);
        const label = Math.round(xs[i + 1] - xs[i]);
        text(g, (x1 + x2) / 2, chainY + 28, label, 'dimText', null, { anchor: 'middle' });
      }

      line(g, -125, 0, -125, plateH);
      line(g, -125, 0, 0, 0);
      line(g, -125, plateH, 0, plateH);
      text(g, -150, plateH / 2, heightMm, 'dimText', -90, { anchor: 'middle' });

      const ys = [0, ...[...new Set(points.map(([, y]) => y))].sort((a, b) => a - b), heightMm];
      for (let i = 0; i < ys.length - 1; i += 1) {
        const y1 = ys[i] * scale;
        const y2 = ys[i + 1] * scale;
        line(g, -38, y1, -38, y2);
        line(g, -55, y2, -38, y2);
        const label = Math.round(ys[i + 1] - ys[i]);
        text(g, -72, (y1 + y2) / 2, label, 'dimText', -90, { anchor: 'middle' });
      }
    }

    fields.forEach((id) => document.querySelector(`#${id}`).addEventListener('input', draw));
    document.querySelector('#downloadSvg').addEventListener('click', () => {
      const blob = new Blob([svg.outerHTML], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'board-layout.svg';
      link.click();
      URL.revokeObjectURL(url);
    });
    draw();
  </script>
</body>
</html>
