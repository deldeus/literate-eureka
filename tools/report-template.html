<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>项目报备快速生成器</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9dee7;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --accent: #f59e0b;
      --danger: #c2410c;
      --soft: #eef7f5;
      --shadow: 0 18px 48px rgba(16, 24, 40, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      padding: 8px 2px 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 42px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subhead {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(360px, 0.92fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .form-panel {
      padding: 22px;
    }

    .preview-panel {
      position: sticky;
      top: 18px;
      overflow: hidden;
    }

    .section {
      padding: 20px 0;
      border-top: 1px solid var(--line);
    }

    .section:first-child {
      padding-top: 0;
      border-top: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
    }

    .hint,
    .field-hint {
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .grid.three {
      grid-template-columns: 0.8fr 1fr 0.9fr;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: #344054;
      font-size: 14px;
      font-weight: 650;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid #cbd5e1;
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      padding: 9px 11px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    textarea {
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .inline {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .inline > * {
      min-width: 0;
    }

    .identity-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .identity {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .identity-head {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 9px 11px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    .identity-head input {
      width: 17px;
      height: 17px;
      min-height: auto;
      accent-color: var(--brand);
    }

    .identity.on {
      border-color: rgba(15, 118, 110, 0.55);
      background: var(--soft);
    }

    .identity-editors {
      display: grid;
      gap: 10px;
    }

    .identity-editor {
      display: grid;
      gap: 10px;
      border: 1px solid rgba(15, 118, 110, 0.22);
      border-radius: 8px;
      background: #fbfefd;
      padding: 12px;
    }

    .identity-editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .identity-editor-title {
      font-weight: 800;
      color: #20312d;
    }

    .identity-contact-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .identity-actions {
      display: flex;
      justify-content: flex-end;
    }

    .mini-btn {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 7px 10px;
      background: #fff;
      color: #26344d;
      font-weight: 750;
    }

    .mini-btn:hover {
      background: #f8fafc;
    }

    .mini-btn.add {
      color: var(--brand);
      border-color: rgba(15, 118, 110, 0.3);
      background: var(--soft);
    }

    .mini-btn.danger {
      color: var(--danger);
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented label {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 13px;
      background: #fff;
      color: #344054;
      font-weight: 700;
      cursor: pointer;
    }

    .segmented input:checked + span {
      color: #fff;
    }

    .segmented label:has(input:checked) {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .template-list {
      display: grid;
      gap: 10px;
    }

    .template-option {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .template-choice {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      padding: 12px;
      cursor: pointer;
    }

    .template-choice input {
      width: 18px;
      height: 18px;
      min-height: auto;
      margin-top: 3px;
      accent-color: var(--brand);
    }

    .template-choice span {
      font-size: 14px;
      font-weight: 750;
      color: #26344d;
      line-height: 1.55;
    }

    .template-option:has(input:checked) {
      border-color: rgba(15, 118, 110, 0.55);
      background: var(--soft);
    }

    .template-inputs {
      display: grid;
      gap: 12px;
      padding: 0 28px 16px 40px;
    }


    .btn {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 9px 14px;
      font-weight: 750;
      color: #fff;
      background: var(--brand);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover {
      background: var(--brand-dark);
    }

    .btn.secondary {
      color: var(--text);
      background: #fff;
      border-color: var(--line);
    }

    .btn.secondary:hover {
      background: #f8fafc;
    }

    .btn.primary-copy {
      color: #fff;
      background: #178058;
      border-color: #0f6b49;
      box-shadow: 0 10px 22px rgba(23, 128, 88, 0.24);
    }

    .btn.primary-copy:hover {
      background: #116b49;
    }

    .btn.warn {
      color: #fff;
      background: var(--accent);
    }

    .btn.warn:hover {
      background: #d97706;
    }

    .preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .preview-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
    }

    .status.warn {
      color: var(--danger);
      font-weight: 700;
    }

    #output {
      min-height: 360px;
      height: min(58vh, 620px);
      border: 0;
      border-radius: 0;
      padding: 18px;
      font-size: 17px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .address-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .match-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      width: fit-content;
      border-radius: 999px;
      background: #ecfdf3;
      color: #027a48;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .match-pill.empty {
      background: #f2f4f7;
      color: var(--muted);
    }

    .required-note {
      color: var(--danger);
      font-size: 12px;
      min-height: 18px;
    }

    @media (max-width: 980px) {
      .app {
        padding: 16px;
      }

      header {
        display: grid;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .preview-panel {
        position: static;
      }

      .preview-head {
        align-items: stretch;
        display: grid;
      }

      .preview-tools {
        justify-content: stretch;
      }

      .preview-tools .btn {
        flex: 1 1 0;
      }

      .identity-list,
      .grid,
      .grid.three {
        grid-template-columns: 1fr;
      }
    }

    /* iPhone-style refinement aligned with the quote module. */
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #687385;
      --line: #d9dee7;
      --brand: #146c94;
      --brand-dark: #0f506d;
      --accent: #a8842e;
      --soft: #e9f4f8;
      --shadow: 0 18px 44px rgba(20, 36, 55, 0.08);
    }

    body {
      background: var(--bg);
    }

    .app {
      width: min(1440px, 100%);
      padding: 28px;
    }

    .panel,
    .card,
    .preview-panel {
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    input,
    textarea,
    select {
      min-height: 52px;
      border-radius: 14px;
      border-color: #cfd6e2;
      padding: 12px 14px;
      font-size: 16px;
    }

    .btn,
    button,
    .pill,
    .option,
    .template-option {
      min-height: 52px;
      border-radius: 16px;
    }

    .grid,
    .grid.three,
    .identity-list,
    .preview-tools,
    .toolbar {
      gap: 14px;
    }

    .preview-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 320px);
      align-items: center;
      padding: 16px 18px;
    }

    .preview-tools {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      justify-content: stretch;
    }

    .preview-tools .btn {
      width: 100%;
      min-height: 48px;
      padding: 10px 14px;
      border-radius: 14px;
      white-space: nowrap;
    }

    .area-time-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: end;
      gap: 18px;
    }

    .area-time-grid > .field {
      display: grid;
      grid-template-rows: auto 52px 52px;
      gap: 10px;
    }

    .area-time-grid > .field:last-child::before {
      content: "";
      display: block;
    }

    .area-time-grid .segmented {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .area-time-grid .segmented label {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      padding: 8px 12px;
      text-align: center;
      white-space: nowrap;
    }

    .area-time-grid input {
      min-height: 52px;
    }

    @media (max-width: 760px) {
      .app {
        padding: 14px;
      }

      .preview-head {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .area-time-grid {
        grid-template-columns: 1fr;
      }

      .area-time-grid > .field {
        grid-template-rows: auto auto auto;
      }

      .area-time-grid > .field:last-child::before {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>项目报备快速生成器</h1>
        <p class="subhead">左侧填写，右侧实时生成报备文字；看右侧就能马上确认格式有没有问题。</p>
      </div>
      <div class="toolbar">
      </div>
    </header>

    <div class="layout">
      <form class="panel form-panel" id="reportForm" autocomplete="off">
        <section class="section">
          <div class="section-title">
            <h2>基础信息</h2>
            <span class="hint">月份默认取当前月，可手动改</span>
          </div>
          <div class="grid three">
            <div class="field">
              <label for="month">当月月份</label>
              <input id="month" name="month" inputmode="numeric" placeholder="6">
            </div>
            <div class="field">
              <label for="projectNo">编号</label>
              <input id="projectNo" name="projectNo" placeholder="49">
            </div>
            <div class="field">
              <label for="nameNo">张苗苗后缀数字</label>
              <div class="inline">
                <input value="张苗苗" aria-label="固定姓名" readonly>
                <input id="nameNo" name="nameNo" placeholder="5">
              </div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="grid">
            <div class="field">
              <label for="projectName">项目名称</label>
              <input id="projectName" name="projectName" placeholder="餐厅">
            </div>
            <div class="field">
              <label for="product">使用产品</label>
              <input id="product" name="product" placeholder="铁锈">
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-title">
            <h2>项目地址</h2>
            <span class="hint">输入城市自动补省，直辖市保持原样</span>
          </div>
          <div class="address-row">
            <div class="field">
              <label for="address">地址/城市</label>
              <input id="address" name="address" placeholder="咸阳 / 常州 / 北京">
              <span class="field-hint">也可以直接填写完整地址，例如“陕西咸阳秦都区”。</span>
            </div>
            <span class="match-pill empty" id="addressMatch">未匹配</span>
          </div>
        </section>

        <section class="section">
          <div class="section-title">
            <h2>项目身份</h2>
            <span class="hint">可多选；微信必填，旺旺选填</span>
          </div>
          <div class="identity-list" id="identityList"></div>
          <div class="identity-editors" id="identityEditors"></div>
          <div class="required-note" id="identityWarning"></div>
        </section>

        <section class="section">
          <div class="section-title">
            <h2>面积与时间</h2>
          </div>
          <div class="grid area-time-grid">
            <div class="field">
              <label>使用面积</label>
              <div class="segmented" aria-label="面积格式">
                <label><input type="radio" name="areaMode" value="standard" checked><span>数字 + 平方左右</span></label>
                <label><input type="radio" name="areaMode" value="free"><span>自由填写</span></label>
              </div>
              <input id="area" name="area" placeholder="100">
            </div>
            <div class="field">
              <label for="useTime">使用时间</label>
              <input id="useTime" name="useTime" placeholder="6月底">
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-title">
            <h2>项目情况</h2>
            <span class="hint">先选一句话模板，再填这句话里的空</span>
          </div>
          <div class="template-list" aria-label="项目情况模板">
            <div class="template-option">
              <label class="template-choice">
                <input type="radio" name="situationMode" value="free" checked>
                <span>自由填写：自己输入整句项目情况</span>
              </label>
              <div class="template-inputs situation-field" data-mode="free">
                <div class="field">
                  <label for="situationFree">自由填写</label>
                  <textarea id="situationFree" rows="3" placeholder="如有咨询，请配合高于120一平，不含税运，谢谢！"></textarea>
                </div>
              </div>
            </div>

            <div class="template-option">
              <label class="template-choice">
                <input type="radio" name="situationMode" value="price">
                <span>如有咨询，请配合高于【填写内容】一平，不含税运，谢谢！</span>
              </label>
              <div class="template-inputs situation-field" data-mode="price" hidden>
                <div class="field">
                  <label for="priceValue">填写“高于”后面的内容</label>
                  <input id="priceValue" placeholder="硬质120 / 120 / 一百二十">
                </div>
              </div>
            </div>

            <div class="template-option">
              <label class="template-choice">
                <input type="radio" name="situationMode" value="hardSoft">
                <span>如有咨询请配合硬质高于【填写内容】一平，软质高于【填写内容】一平，不含税运，谢谢</span>
              </label>
              <div class="template-inputs situation-field" data-mode="hardSoft" hidden>
                <div class="grid">
                  <div class="field">
                    <label for="hardValue">硬质高于</label>
                    <input id="hardValue" placeholder="120">
                  </div>
                  <div class="field">
                    <label for="softValue">软质高于</label>
                    <input id="softValue" placeholder="100">
                  </div>
                </div>
              </div>
            </div>

            <div class="template-option">
              <label class="template-choice">
                <input type="radio" name="situationMode" value="sheet">
                <span>如果遇到，麻烦配合【填写内容】一张 不含税运</span>
              </label>
              <div class="template-inputs situation-field" data-mode="sheet" hidden>
                <div class="field">
                  <label for="sheetValue">填写“一张”前面的内容</label>
                  <input id="sheetValue" placeholder="XXXXXX">
                </div>
              </div>
            </div>
          </div>
        </section>
      </form>

      <section class="panel preview-panel">
        <div class="preview-head">
          <div>
            <h2>生成报备信息</h2>
            <div class="status" id="statusText">左侧填写时，这里会实时变化。</div>
          </div>
          <div class="preview-tools">
            <button class="btn primary-copy" id="copyBtn" type="button">一键复制</button>
            <button class="btn secondary" id="resetSide" type="button">一键重置</button>
          </div>
        </div>
        <textarea id="output" spellcheck="false"></textarea>
      </section>
    </div>

  </main>

  <script>
    const identities = [

    const municipalities = new Set(["北京", "上海", "重庆", "天津", "香港", "澳门"]);
    const provinceNames = [
      "北京", "上海", "重庆", "天津", "河北", "山西", "内蒙古", "辽宁", "吉林", "黑龙江",
      "江苏", "浙江", "安徽", "福建", "江西", "山东", "河南", "湖北", "湖南", "广东",
      "广西", "海南", "四川", "贵州", "云南", "西藏", "陕西", "甘肃", "青海", "宁夏",
      "新疆", "香港", "澳门", "台湾"
    ];

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));

    const identityList = $("#identityList");
    const identityEditors = $("#identityEditors");
    const output = $("#output");
    const statusText = $("#statusText");
    const addressMatch = $("#addressMatch");
    let identityContacts = Object.fromEntries(identities.map((name) => [name, [{ wechat: "", wangwang: "" }]]));

    function trimValue(id) {
      return $(id).value.trim();
    }

    function currentMonth() {
      return String(new Date().getMonth() + 1);
    }

    function buildIdentityCards() {
      identityList.innerHTML = identities.map((name, index) => `
        <div class="identity" data-identity="${name}">
          <label class="identity-head">
            <input type="checkbox" class="identity-check" data-index="${index}">
            <span>${name}</span>
          </label>
        </div>
      `).join("");
    }

    function checkedIdentities() {
      return $$(".identity").filter((card) => card.querySelector(".identity-check").checked).map((card) => card.dataset.identity);
    }

    function syncIdentityContactsFromDom() {
      $$(".identity-editor").forEach((editor) => {
        const name = editor.dataset.identity;
        const contacts = Array.from(editor.querySelectorAll(".identity-contact-row")).map((row) => ({
          wechat: row.querySelector(".wechat").value.trim(),
          wangwang: row.querySelector(".wangwang").value.trim()
        }));
        identityContacts[name] = contacts.length ? contacts : [{ wechat: "", wangwang: "" }];
      });
    }

    function buildIdentityEditors() {
      const selected = checkedIdentities();
      identityEditors.innerHTML = selected.map((name) => {
        const contacts = identityContacts[name]?.length ? identityContacts[name] : [{ wechat: "", wangwang: "" }];
        return `
          <div class="identity-editor" data-identity="${name}">
            <div class="identity-editor-head">
              <div class="identity-editor-title">${name}信息</div>
              <button class="mini-btn add add-contact" type="button" data-identity="${name}">新增${name}</button>
            </div>
            ${contacts.map((contact, index) => `
              <div class="identity-contact-row" data-index="${index}">
                <div class="field">
                  <label>${contacts.length > 1 ? `${name}${index + 1}` : name}微信（必填）</label>
                  <input class="wechat" value="${escapeAttr(contact.wechat)}" placeholder="微信号/昵称">
                </div>
                <div class="field">
                  <label>旺旺（选填）</label>
                  <input class="wangwang" value="${escapeAttr(contact.wangwang)}" placeholder="填写后才显示">
                </div>
                <button class="mini-btn danger remove-contact" type="button" data-identity="${name}" data-index="${index}" ${contacts.length <= 1 ? "disabled" : ""}>删除</button>
              </div>
            `).join("")}
          </div>
        `;
      }).join("");
    }

    function escapeAttr(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function hasProvincePrefix(text) {
      return provinceNames.some((province) => text.startsWith(province));
    }

    function normalizeCityName(text) {
      return text.replace(/[省市区县\s]/g, "");
    }

    function formatAddress(raw) {
      const value = raw.trim();
      if (!value) {
        return { text: "", label: "未匹配", matched: false };
      }

      if (hasProvincePrefix(value)) {
        return { text: value, label: "已含省份", matched: true };
      }

      const compact = normalizeCityName(value);
      const city = Object.keys(provinceByCity).find((item) => compact.startsWith(item) || compact.includes(item));
      if (!city) {
        return { text: value, label: "未匹配", matched: false };
      }

      if (municipalities.has(city)) {
        const rest = value.replace(new RegExp(`^${city}市?`), "");
        return { text: `${city}${rest}`, label: city, matched: true };
      }

      const province = provinceByCity[city];
      return { text: `${province}${value}`, label: `${province}${city}`, matched: true };
    }

    function updateAddressMatch() {
      const result = formatAddress(trimValue("#address"));
      addressMatch.textContent = result.label;
      addressMatch.classList.toggle("empty", !result.matched);
    }

    function selectedArea() {
      const area = trimValue("#area");
      if (!area) return "";
      const mode = document.querySelector("input[name='areaMode']:checked").value;
      if (mode === "free") return area;
      return `${area}平方左右`;
    }

    function selectedSituation() {
      const mode = document.querySelector("input[name='situationMode']:checked").value;
      if (mode === "price") {
        const value = trimValue("#priceValue");
        return `如有咨询，请配合高于${value}一平，不含税运，谢谢！`;
      }
      if (mode === "hardSoft") {
        const hard = trimValue("#hardValue");
        const soft = trimValue("#softValue");
        return `如有咨询请配合硬质高于${hard}一平，软质高于${soft}一平，不含税运，谢谢`;
      }
      if (mode === "sheet") {
        const value = trimValue("#sheetValue");
        return `如果遇到，麻烦配合${value}一张 不含税运`;
      }
      return trimValue("#situationFree");
    }

    function selectedIdentities() {
      const missing = [];
      const selected = checkedIdentities().flatMap((name) => {
        const contacts = identityContacts[name]?.length ? identityContacts[name] : [{ wechat: "", wangwang: "" }];
        return contacts.map((contact, index) => {
          const label = contacts.length > 1 ? `${name}${index + 1}` : name;
          if (!contact.wechat) missing.push(label);
          const wangwangPart = contact.wangwang ? `（旺旺：${contact.wangwang}）` : "";
          return `${label}（微信：${contact.wechat}）${wangwangPart}`;
        });
      });

      return { selected, missing };
    }

    function line(label, value) {
      return `${label}：${value || ""}`;
    }

    function projectReportCode() {
      const month = trimValue("#month");
      const projectNo = trimValue("#projectNo");
      const nameNo = trimValue("#nameNo");
      return `${month}-${projectNo}-张苗苗${nameNo}`;
    }

    function refreshStatus(missing) {
      $("#identityWarning").textContent = missing.length
        ? `以下身份缺少微信：${missing.join("、")}`
        : "";

      statusText.textContent = missing.length
        ? "右侧已实时更新，但有身份缺少微信。"
        : "右侧已实时更新，也可以直接手动编辑文字。";
      statusText.classList.toggle("warn", missing.length > 0);
    }

    function buildReport() {
      const address = formatAddress(trimValue("#address")).text;
      const identitiesResult = selectedIdentities();

      refreshStatus(identitiesResult.missing);

      const rows = [
        line("项目报备", projectReportCode()),
        line("项目名称", trimValue("#projectName")),
        line("项目地址", address),
        line("项目身份", identitiesResult.selected.join("；")),
        line("使用产品", trimValue("#product")),
        line("使用面积", selectedArea()),
        line("使用时间", trimValue("#useTime")),
        line("项目情况", selectedSituation())
      ];

      output.value = rows.join("\n");
    }

    function updateSituationFields() {
      const mode = document.querySelector("input[name='situationMode']:checked").value;
      $$(".situation-field").forEach((field) => {
        field.hidden = field.dataset.mode !== mode;
      });
    }

    function resetForm() {
      $("#reportForm").reset();
      $("#month").value = currentMonth();
      statusText.textContent = "左侧填写时，这里会实时变化。";
      statusText.classList.remove("warn");
      $("#identityWarning").textContent = "";
      $$(".identity").forEach((card) => card.classList.remove("on"));
      identityContacts = Object.fromEntries(identities.map((name) => [name, [{ wechat: "", wangwang: "" }]]));
      buildIdentityEditors();
      updateSituationFields();
      updateAddressMatch();
      buildReport();
    }

    async function copyOutput() {
      if (!output.value.trim()) {
        statusText.textContent = "没有可复制的内容。";
        statusText.classList.add("warn");
        return;
      }

      try {
        await navigator.clipboard.writeText(output.value);
        statusText.textContent = "已复制到剪贴板。";
        statusText.classList.remove("warn");
      } catch (error) {
        output.select();
        document.execCommand("copy");
        statusText.textContent = "已选中并尝试复制。";
        statusText.classList.remove("warn");
      }
    }

    buildIdentityCards();
    buildIdentityEditors();
    $("#month").value = currentMonth();
    updateSituationFields();
    updateAddressMatch();
    buildReport();

    identityList.addEventListener("change", (event) => {
      if (!event.target.classList.contains("identity-check")) return;
      syncIdentityContactsFromDom();
      const card = event.target.closest(".identity");
      card.classList.toggle("on", event.target.checked);
      const name = card.dataset.identity;
      if (event.target.checked && !identityContacts[name]?.length) {
        identityContacts[name] = [{ wechat: "", wangwang: "" }];
      }
      buildIdentityEditors();
      buildReport();
    });

    identityEditors.addEventListener("click", (event) => {
      const addButton = event.target.closest(".add-contact");
      const removeButton = event.target.closest(".remove-contact");
      if (!addButton && !removeButton) return;
      syncIdentityContactsFromDom();
      if (addButton) {
        const name = addButton.dataset.identity;
        identityContacts[name].push({ wechat: "", wangwang: "" });
      }
      if (removeButton) {
        const name = removeButton.dataset.identity;
        const index = Number(removeButton.dataset.index);
        identityContacts[name].splice(index, 1);
        if (!identityContacts[name].length) identityContacts[name].push({ wechat: "", wangwang: "" });
      }
      buildIdentityEditors();
      buildReport();
    });

    $("#reportForm").addEventListener("input", () => {
      syncIdentityContactsFromDom();
      updateAddressMatch();
      buildReport();
    });

    $("#reportForm").addEventListener("change", () => {
      syncIdentityContactsFromDom();
      updateSituationFields();
      updateAddressMatch();
      buildReport();
    });

    $$(".template-option").forEach((option) => {
      option.addEventListener("click", (event) => {
        if (event.target.matches("input:not([name='situationMode']), textarea")) return;
        const input = option.querySelector("input[name='situationMode']");
        input.checked = true;
        updateSituationFields();
        buildReport();
      });
    });

    $("#resetSide").addEventListener("click", resetForm);
    $("#copyBtn").addEventListener("click", copyOutput);
  </script>
