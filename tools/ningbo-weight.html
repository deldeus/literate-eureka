<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>宁波重量快速计算</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-soft: #e2f3f0;
      --warn: #c2410c;
      --shadow: 0 18px 44px rgba(20, 30, 45, .09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(1180px, calc(100vw - 28px));
      margin: 20px auto 36px;
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      gap: 16px;
    }

    header {
      width: min(1180px, calc(100vw - 28px));
      margin: 24px auto 0;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .source {
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .left {
      padding: 16px;
      min-height: 720px;
    }

    .right {
      padding: 18px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 7px;
    }

    input, select, button {
      font: inherit;
    }

    input, select {
      width: 100%;
      height: 44px;
      border: 1px solid #cbd3df;
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .16);
    }

    .search-row {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--panel);
      padding-bottom: 12px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin-top: 8px;
    }

    .list {
      display: grid;
      gap: 8px;
      max-height: 610px;
      overflow: auto;
      padding-right: 4px;
    }

    .product {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 11px 12px;
      text-align: left;
      cursor: pointer;
      display: grid;
      gap: 4px;
    }

    .product:hover, .product.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .product-name {
      font-weight: 700;
      font-size: 17px;
    }

    .product-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .grid.two {
      grid-template-columns: repeat(2, 1fr);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border: 1px solid #b9c3d2;
      background: #fff;
      border-radius: 999px;
      min-height: 38px;
      padding: 0 15px;
      cursor: pointer;
      font-weight: 650;
    }

    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      background: #fbfcfe;
      min-height: 92px;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 25px;
      line-height: 1.08;
    }

    .metric small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .result-row {
      display: grid;
      grid-template-columns: minmax(250px, .68fr) minmax(360px, 1.32fr);
      gap: 12px;
    }

    .result-card,
    .crate {
      background: #111827;
      color: #fff;
      border-radius: 8px;
      padding: 18px 20px;
      display: grid;
      gap: 12px;
      min-height: 142px;
      border: 2px solid #22c55e;
      box-shadow: 0 10px 28px rgba(15, 23, 42, .18);
    }

    .result-card {
      background: #0f766e;
      border-color: #fbbf24;
    }

    .result-card .label,
    .crate .label {
      color: rgba(255, 255, 255, .82);
      font-size: 13px;
      font-weight: 700;
    }

    .result-value,
    .crate-size {
      line-height: 1;
      font-weight: 800;
    }

    .result-value {
      font-size: clamp(30px, 4vw, 46px);
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
    }

    .result-value.small {
      font-size: clamp(26px, 3.3vw, 38px);
    }

    .result-value.compact {
      font-size: clamp(22px, 2.8vw, 32px);
    }

    .crate-size {
      font-size: clamp(30px, 4.1vw, 44px);
      word-break: break-all;
    }

    .result-note {
      color: rgba(255, 255, 255, .82);
      font-size: 14px;
      line-height: 1.45;
    }

    .formula {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      line-height: 1.7;
      background: #fff;
      color: #334155;
    }

    .formula code {
      background: #eef2f7;
      border-radius: 5px;
      padding: 2px 6px;
      color: #0f172a;
    }

    .warn {
      color: var(--warn);
      font-weight: 650;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .copy {
      border: 1px solid var(--accent);
      color: #fff;
      background: var(--accent);
      border-radius: 7px;
      min-height: 42px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .copy.secondary {
      color: var(--accent);
      background: #fff;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px 10px;
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    @media (max-width: 860px) {
      header {
        align-items: start;
        flex-direction: column;
      }
      .source { text-align: left; }
      main {
        grid-template-columns: 1fr;
      }
      .left {
        min-height: auto;
      }
      .list {
        max-height: 320px;
      }
      .grid, .grid.two, .metric-row, .result-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>宁波重量快速计算</h1>
      <div class="hint">输入产品关键字，选择规格和数量后自动计算板重、总重和木箱尺寸。</div>
    </div>
    <div class="source">数据来自：平方重量厚度(1).docx</div>
  </header>

  <main>
    <section class="panel left">
      <div class="search-row">
        <label for="search">产品搜索</label>
        <input id="search" autocomplete="off" placeholder="例如：脉、脉络石、圆线石">
        <div class="hint">支持连续关键字和单字匹配。输入“脉”会匹配“圆线石脉络石”。</div>
      </div>
      <div id="productList" class="list"></div>
    </section>

    <section class="panel right">
      <div>
        <label>当前产品</label>
        <div id="currentName" style="font-size:26px;font-weight:800;">请选择产品</div>
        <div id="currentMeta" class="hint"></div>
      </div>

      <div>
        <label>规格</label>
        <div id="sizeChips" class="chips"></div>
      </div>

      <div class="grid">
        <div>
          <label for="qty">数量（张）</label>
          <input id="qty" type="number" min="1" step="1" placeholder="请输入张数" inputmode="numeric">
        </div>
        <div>
          <label for="crateThickness">木箱按厚度（mm）</label>
          <input id="crateThickness" type="number" min="0" step="0.1">
        </div>
        <div>
          <label for="kgPerSqm">平方重量（kg/㎡）</label>
          <input id="kgPerSqm" type="number" min="0" step="0.1">
        </div>
      </div>

      <div class="metric-row">
        <div class="metric">
          <span>单张理论重量</span>
          <strong id="rawWeight">-</strong>
          <small id="rawFormula">长 * 宽 * 平方重量</small>
        </div>
        <div class="metric">
          <span>单张取整重量</span>
          <strong id="sheetWeight">-</strong>
          <small>向上取整</small>
        </div>
        <div class="metric">
          <span>产品尺寸</span>
          <strong id="sizeMetric">-</strong>
          <small>单位：mm</small>
        </div>
      </div>

      <div class="result-row">
        <div class="result-card">
          <div class="label">总重量</div>
          <div id="totalWeight" class="result-value">-</div>
          <div class="result-note">单张取整重量 * 数量</div>
        </div>
        <div class="crate">
          <div class="label">木箱尺寸（长 * 宽 * 高，单位 mm）</div>
          <div id="crateSize" class="crate-size">-</div>
          <div id="crateFormula" class="label"></div>
        </div>
      </div>

      <div class="formula" id="detailFormula">
        选择产品后显示计算过程。
      </div>

      <div class="actions">
        <button class="copy" id="copySummary">复制计算结果</button>
        <button class="copy secondary" id="resetBtn">重置数量</button>
      </div>
    </section>
  </main>

    const els = {
      search: document.querySelector("#search"),
      productList: document.querySelector("#productList"),
      currentName: document.querySelector("#currentName"),
      currentMeta: document.querySelector("#currentMeta"),
      sizeChips: document.querySelector("#sizeChips"),
      qty: document.querySelector("#qty"),
      crateThickness: document.querySelector("#crateThickness"),
      kgPerSqm: document.querySelector("#kgPerSqm"),
      rawWeight: document.querySelector("#rawWeight"),
      rawFormula: document.querySelector("#rawFormula"),
      sheetWeight: document.querySelector("#sheetWeight"),
      totalWeight: document.querySelector("#totalWeight"),
      sizeMetric: document.querySelector("#sizeMetric"),
      crateSize: document.querySelector("#crateSize"),
      crateFormula: document.querySelector("#crateFormula"),
      detailFormula: document.querySelector("#detailFormula"),
      copySummary: document.querySelector("#copySummary"),
      resetBtn: document.querySelector("#resetBtn")
    };

    let selectedProduct = products.find(item => item.name.includes("脉络石")) || products[0];
    let selectedSize = selectedProduct.sizes[0];

    function normalize(text) {
      return String(text || "").toLowerCase().replace(/\s+/g, "").replace(/[()（）]/g, "");
    }

    function fuzzyMatch(text, query) {
      const cleanText = normalize(text);
      const cleanQuery = normalize(query);
      if (!cleanQuery) return true;
      if (cleanText.includes(cleanQuery)) return true;
      let index = 0;
      for (const char of cleanText) {
        if (char === cleanQuery[index]) index += 1;
        if (index === cleanQuery.length) return true;
      }
      return false;
    }

    function maxThickness(thickness) {
      const nums = String(thickness || "").match(/\d+(?:\.\d+)?/g);
      if (!nums) return 0;
      return Math.max(...nums.map(Number));
    }

    function defaultCrateThickness(product) {
      return product.crateThickness ?? maxThickness(product.thickness);
    }

    function parseSize(size) {
      const parts = String(size).replace("×", "*").split("*").map(part => Number(part.trim()));
      return { length: parts[0] || 0, width: parts[1] || 0 };
    }

    function formatNumber(num, digits = 2) {
      if (!Number.isFinite(num)) return "-";
      return Number(num.toFixed(digits)).toLocaleString("zh-CN");
    }

    function renderProducts() {
      const query = els.search.value;
      const matches = products.filter(product => fuzzyMatch(product.name, query));
      els.productList.innerHTML = "";
      if (!matches.length) {
        els.productList.innerHTML = '<div class="empty">没有找到匹配产品</div>';
        return;
      }
      matches.forEach(product => {
        const button = document.createElement("button");
        button.className = `product${product === selectedProduct ? " active" : ""}`;
        button.innerHTML = `
          <div class="product-name">${product.name}</div>
          <div class="product-meta">
            <span>厚度 ${product.thickness}mm</span>
            <span>${product.kgPerSqm}kg/㎡</span>
            <span>${product.sizes.join("、")}</span>
          </div>
        `;
        button.addEventListener("click", () => selectProduct(product));
        els.productList.appendChild(button);
      });
    }

    function renderSizes() {
      els.sizeChips.innerHTML = "";
      selectedProduct.sizes.forEach(size => {
        const button = document.createElement("button");
        button.className = `chip${size === selectedSize ? " active" : ""}`;
        button.textContent = size;
        button.addEventListener("click", () => {
          selectedSize = size;
          renderSizes();
          calculate();
        });
        els.sizeChips.appendChild(button);
      });
    }

    function selectProduct(product) {
      selectedProduct = product;
      selectedSize = product.sizes[0];
      els.crateThickness.value = defaultCrateThickness(product);
      els.kgPerSqm.value = product.kgPerSqm;
      renderProducts();
      renderSizes();
      calculate();
    }

    function calculate() {
      const qty = Math.max(0, Math.floor(Number(els.qty.value) || 0));
      const kgPerSqm = Number(els.kgPerSqm.value) || 0;
      const crateThickness = Number(els.crateThickness.value) || 0;
      const { length, width } = parseSize(selectedSize);
      const area = length / 1000 * width / 1000;
      const rawWeight = area * kgPerSqm;
      const sheetWeight = Math.ceil(rawWeight);
      const totalWeight = sheetWeight * qty;
      const crateLength = length + 100;
      const crateWidth = width + 100;
      const crateHeight = Math.ceil(crateThickness * qty + 200);

      els.currentName.textContent = selectedProduct.name;
      els.currentMeta.innerHTML = `编号 ${selectedProduct.no} · 表格厚度 ${selectedProduct.thickness}mm · 规格 ${selectedProduct.sizes.join("、")}`;
      els.rawWeight.textContent = `${formatNumber(rawWeight)} KG`;
      els.rawFormula.textContent = `${formatNumber(length / 1000, 3)} * ${formatNumber(width / 1000, 3)} * ${kgPerSqm}`;
      els.sheetWeight.textContent = `${sheetWeight.toLocaleString("zh-CN")} KG`;
      els.totalWeight.textContent = `${totalWeight.toLocaleString("zh-CN")} KG`;
      els.totalWeight.classList.toggle("small", totalWeight >= 1000 && totalWeight < 10000);
      els.totalWeight.classList.toggle("compact", totalWeight >= 10000);
      els.sizeMetric.textContent = selectedSize;
      els.crateSize.textContent = `${crateLength}*${crateWidth}*${crateHeight}`;
      els.crateFormula.textContent = `${crateLength} = ${length}+100，${crateWidth} = ${width}+100，高 ${crateHeight} = ${qty}*${crateThickness}+100+100`;
      els.detailFormula.innerHTML = `
        <div><strong>${selectedProduct.name}</strong> / ${selectedSize} / ${qty}张</div>
        <div>单张重量：<code>${length / 1000} * ${width / 1000} * ${kgPerSqm} = ${formatNumber(rawWeight)}KG</code>，向上取整为 <code>${sheetWeight}KG</code></div>
        <div>总重量：<code>${sheetWeight} * ${qty} = ${totalWeight}KG</code></div>
        <div>木箱：长宽各加 100mm，高度 = <code>${qty} * ${crateThickness} + 100 + 100 = ${crateHeight}mm</code></div>
        ${selectedProduct.name.includes("脉络石") && selectedProduct.thickness !== "3-8" ? '<div class="warn">提示：Excel 中圆线石脉络石厚度为 3-9mm；当前木箱厚度按你的示例默认 8mm，可手动改为 9。</div>' : ""}
      `;
    }

    async function copySummary() {
      const text = [
        `${selectedProduct.name} ${selectedSize}`,
        `数量：${els.qty.value}张`,
        `单张取整重量：${els.sheetWeight.textContent}`,
        `总重量：${els.totalWeight.textContent}`,
        `木箱尺寸：${els.crateSize.textContent}mm`
      ].join("\n");
      try {
        await navigator.clipboard.writeText(text);
        els.copySummary.textContent = "已复制";
        setTimeout(() => { els.copySummary.textContent = "复制计算结果"; }, 1200);
      } catch {
        window.prompt("复制下面内容", text);
      }
    }

    els.search.addEventListener("input", renderProducts);
    els.qty.addEventListener("input", calculate);
    els.crateThickness.addEventListener("input", calculate);
    els.kgPerSqm.addEventListener("input", calculate);
    els.copySummary.addEventListener("click", copySummary);
    els.resetBtn.addEventListener("click", () => {
      els.qty.value = "";
      calculate();
    });

    function applyUrlParams() {
      const params = new URLSearchParams(window.location.search);
      const query = params.get("q") || "脉";
      const productQuery = params.get("product");
      const sizeQuery = params.get("size");
      const qty = params.get("qty");
      const crateThickness = params.get("crateThickness");
      const kgPerSqm = params.get("kgPerSqm");

      if (productQuery) {
        const found = products.find(product => fuzzyMatch(product.name, productQuery));
        if (found) selectedProduct = found;
      }
      els.search.value = query;
      selectProduct(selectedProduct);
      if (selectedProduct.sizes.includes(sizeQuery)) selectedSize = sizeQuery;
      if (qty) els.qty.value = qty;
      if (crateThickness) els.crateThickness.value = crateThickness;
      if (kgPerSqm) els.kgPerSqm.value = kgPerSqm;
      renderProducts();
      renderSizes();
      calculate();
    }

    applyUrlParams();
  </script>
