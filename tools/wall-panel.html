<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>板材上墙排版确认</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3ee;
      --ink: #1f2522;
      --muted: #66706a;
      --line: #303632;
      --panel: #d7d4ca;
      --panel-2: #c8c5bb;
      --accent: #ca4b22;
      --paper: #fffdf8;
      --border: #d8d2c5;
      --shadow: 0 16px 40px rgba(41, 35, 25, .12);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
    }

    aside {
      border-right: 1px solid var(--border);
      background: var(--paper);
      padding: 14px;
      overflow: auto;
    }

    main {
      min-width: 0;
      padding: 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
    }

    h1 {
      font-size: 19px;
      line-height: 1.2;
      margin: 0 0 12px;
      letter-spacing: 0;
    }

    h2 {
      font-size: 14px;
      margin: 15px 0 8px;
      letter-spacing: 0;
    }

    label {
      color: var(--muted);
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      height: 32px;
      padding: 0 9px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      min-width: 0;
    }

    .wall-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .wall-actions button {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      min-height: 31px;
      padding: 0 9px;
    }

    .wall-actions button.danger {
      color: #9b3b1f;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }

    .segmented button,
    .toolbar button {
      border: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      cursor: pointer;
      min-height: 32px;
    }

    .segmented button.active {
      background: var(--ink);
      color: #fff;
    }

    .segmented.three {
      grid-template-columns: repeat(3, 1fr);
    }

    .panel-editor {
      position: fixed;
      z-index: 50;
      width: 280px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fffaf0;
      padding: 12px;
      box-shadow: 0 18px 46px rgba(41, 35, 25, .18);
    }

    .panel-editor[hidden] {
      display: none;
    }

    .panel-editor strong {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .panel-editor .mini {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 8px;
    }

    .panel-editor .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }

    .panel-editor button {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      min-height: 30px;
      padding: 0 11px;
    }

    .panel-editor button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .panel-tile {
      cursor: pointer;
    }

    .panel-tile.selected {
      outline: none;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
    }

    .toolbar .left,
    .toolbar .right {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .toolbar button {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      padding: 0 12px;
    }

    .toolbar button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(130px, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .metric {
      border: 1px solid var(--border);
      background: var(--paper);
      border-radius: 8px;
      padding: 8px 10px;
    }

    .metric strong {
      display: block;
      font-size: 17px;
      line-height: 1.15;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .canvas-wrap {
      min-height: 0;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, .035) 1px, transparent 1px),
        linear-gradient(rgba(0, 0, 0, .035) 1px, transparent 1px),
        #eee9df;
      background-size: 32px 32px;
      box-shadow: var(--shadow);
      padding: 10px;
    }

    #drawing {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      background: #f9f6ef;
    }

    .cuts {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--paper);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      padding: 9px 10px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      background: #faf8f2;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 14px;
    }

    .check {
      align-items: center;
      color: var(--ink);
      display: flex;
      gap: 8px;
      font-size: 13px;
      margin-top: 10px;
    }

    .check input {
      height: 16px;
      padding: 0;
      width: 16px;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }

      .summary {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
      }
    }

      .canvas-wrap {
        max-width: 100% !important;
        overflow: auto !important;
      }
      table {
        min-width: 560px !important;
      }
    }
    @media (max-width: 430px) {
      aside {
        padding: 12px !important;
      }
      h1 {
        font-size: 18px !important;
      }
      .grid,
      .wall-actions {

      body .segmented button,

<body>
  <div class="app">
    <aside>
      <h1>板材上墙排版确认</h1>

      <label>墙面列表</label>
      <select id="wallSelect"></select>

      <div class="wall-actions">
        <button id="addWall" type="button">新增墙面</button>
        <button id="refreshDrawing" type="button">删除墙面</button>
        <button id="resetWall" type="button">重置当前</button>
        <button id="resetAll" class="danger" type="button">重置全部</button>
      </div>

      <h2>墙面尺寸</h2>
      <div class="field" style="margin-bottom: 10px;">
        <label>墙面名称</label>
        <input id="wallName" type="text" value="自定义墙 1">
      </div>
      <div class="grid">
        <div class="field">
          <label>墙宽 mm</label>
          <input id="wallW" type="number" min="1" step="1">
        </div>
        <div class="field">
          <label>墙高 mm</label>
          <input id="wallH" type="number" min="1" step="1">
        </div>
      </div>

      <h2>板材参数</h2>
      <div class="grid">
        <div class="field">
          <label>板长 mm</label>
          <input id="boardW" type="number" min="1" step="1" value="1200">
        </div>
        <div class="field">
          <label>板宽 mm</label>
          <input id="boardH" type="number" min="1" step="1" value="600">
        </div>
      </div>

      <h2>原板开料</h2>
      <div class="grid">
        <div class="field">
          <label>原板宽 mm</label>
          <input id="rawW" type="number" min="1" step="1" value="1220">
        </div>
        <div class="field">
          <label>原板高 mm</label>
          <input id="rawH" type="number" min="1" step="1" value="2440">
        </div>
      </div>
      <label class="check">
        <input id="allowRotate" type="checkbox" checked>
        允许旋转切割
      </label>

      <h2>排版方向</h2>
      <div class="segmented" role="group" aria-label="排版方向">
        <button id="horizontal" class="active" type="button">横向 1200x600</button>
        <button id="vertical" type="button">竖向 600x1200</button>
      </div>

      <h2>孔位参数</h2>
      <label class="check">
        <input id="noHole" type="checkbox">
        不开孔
      </label>
      <label style="margin-top: 10px;">默认开孔数量</label>
      <div class="segmented three" role="group" aria-label="默认开孔数量">
        <button id="holeMode2" type="button">2 孔</button>
        <button id="holeMode4" class="active" type="button">4 孔</button>
        <button id="holeMode6" type="button">6 孔</button>
      </div>
      <label style="margin-top: 10px;">2孔方向</label>
      <div class="segmented" role="group" aria-label="2孔方向">
        <button id="twoHoleHorizontal" class="active" type="button">左右二孔</button>
        <button id="twoHoleVertical" type="button">上下二孔</button>
      </div>
      <div class="grid">
        <div class="field">
          <label>孔径/孔心标注 mm</label>
          <input id="holeD" type="number" min="1" step="1" value="25">
        </div>
        <div class="field">
          <label>孔距边 mm</label>
          <input id="holeInset" type="number" min="0" step="1" value="100">
        </div>
      </div>

      <h2>裁切位置</h2>
      <div class="grid">
        <div class="field">
          <label>余宽放置</label>
          <select id="cutX">
            <option value="right">右侧</option>
            <option value="left">左侧</option>
            <option value="center">两侧均分</option>
          </select>
        </div>
        <div class="field">
          <label>余高放置</label>
          <select id="cutY">
            <option value="top">上侧</option>
            <option value="bottom">下侧</option>
            <option value="center">上下均分</option>
          </select>
        </div>
      </div>

      <p class="note">
默认按每块板四角孔位示意；可切换左右二孔、上下二孔、4 孔、6 孔。点击图纸中的单块板，可单独调整此块孔数、2孔方向和距边。勾选“不开孔”后图纸不显示孔位。所有尺寸按毫米计算。
      </p>
    </aside>

    <main>
      <div class="toolbar">
        <div class="left">
          <button class="primary" id="exportSvg" type="button">导出 SVG</button>
          <button id="exportPng" type="button">导出 PNG</button>

          <button id="loadExample" type="button">载入两面墙示例</button>
        </div>
      </div>

      <section>
        <div class="summary" id="summary"></div>
        <div class="canvas-wrap">
          <svg id="drawing" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="板材排版图"></svg>
        </div>
        <div class="cuts">
          <table>
            <thead>
              <tr>
                <th>每面墙</th>
                <th>板块数量</th>
                <th>材料数量数据</th>
              </tr>
            </thead>
            <tbody id="cutList"></tbody>
          </table>
        </div>
        <div class="cuts">
          <table>
            <thead>
              <tr>
                <th>全部墙面合计</th>
                <th>数量</th>
                <th>说明</th>
              </tr>
            </thead>
            <tbody id="allCutList"></tbody>
          </table>
        </div>
        <div class="cuts">
          <table>
            <thead>
              <tr>
                <th>原板开料</th>
                <th>切出成品</th>
                <th>利用率</th>
              </tr>
            </thead>
            <tbody id="rawSheetList"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="panelHoleEditor" class="panel-editor" hidden>
    <strong id="panelHoleTitle">单块孔位调整</strong>
    <div class="grid">
      <div class="field">
        <label>此块孔数</label>
        <select id="panelHoleMode">
          <option value="default">跟随默认</option>
          <option value="2">2 孔</option>
          <option value="4">4 孔</option>
          <option value="6">6 孔</option>
          <option value="none">不开孔</option>
        </select>
      </div>
      <div class="field">
        <label>此块距边 mm</label>
        <input id="panelHoleInset" type="number" min="0" step="1" placeholder="跟随默认">
      </div>
      <div class="field" id="panelTwoHoleDirectionField">
        <label>2孔方向</label>
        <select id="panelTwoHoleDirection">
          <option value="default">跟随默认</option>
          <option value="horizontal">左右二孔</option>
          <option value="vertical">上下二孔</option>
        </select>
      </div>
    </div>
    <div class="actions">
      <button id="panelHoleCancel" type="button">取消</button>
      <button id="panelHoleConfirm" class="primary" type="button">确定</button>
    </div>
    <div class="mini">只修改当前选中的这一块板，不影响其它板块。</div>
  </div>

  <script>
    const defaultWall = { name: "自定义墙 1", wallW: "", wallH: "" };
    const exampleWalls = [
      { name: "第一面墙", wallW: 2400, wallH: 2470 },
      { name: "第二面墙", wallW: 4200, wallH: 2470 },
    ];

    const els = {
      wallSelect: document.getElementById("wallSelect"),
      wallName: document.getElementById("wallName"),
      wallW: document.getElementById("wallW"),
      wallH: document.getElementById("wallH"),
      boardW: document.getElementById("boardW"),
      boardH: document.getElementById("boardH"),
      rawW: document.getElementById("rawW"),
      rawH: document.getElementById("rawH"),
      allowRotate: document.getElementById("allowRotate"),
      noHole: document.getElementById("noHole"),
      holeMode2: document.getElementById("holeMode2"),
      holeMode4: document.getElementById("holeMode4"),
      holeMode6: document.getElementById("holeMode6"),
      twoHoleHorizontal: document.getElementById("twoHoleHorizontal"),
      twoHoleVertical: document.getElementById("twoHoleVertical"),
      holeD: document.getElementById("holeD"),
      holeInset: document.getElementById("holeInset"),
      panelHoleEditor: document.getElementById("panelHoleEditor"),
      panelHoleTitle: document.getElementById("panelHoleTitle"),
      panelHoleMode: document.getElementById("panelHoleMode"),
      panelHoleInset: document.getElementById("panelHoleInset"),
      panelTwoHoleDirectionField: document.getElementById("panelTwoHoleDirectionField"),
      panelTwoHoleDirection: document.getElementById("panelTwoHoleDirection"),
      panelHoleCancel: document.getElementById("panelHoleCancel"),
      panelHoleConfirm: document.getElementById("panelHoleConfirm"),
      cutX: document.getElementById("cutX"),
      cutY: document.getElementById("cutY"),
      horizontal: document.getElementById("horizontal"),
      vertical: document.getElementById("vertical"),
      drawing: document.getElementById("drawing"),
      summary: document.getElementById("summary"),
      cutList: document.getElementById("cutList"),
      allCutList: document.getElementById("allCutList"),
      rawSheetList: document.getElementById("rawSheetList"),
      exportSvg: document.getElementById("exportSvg"),
      exportPng: document.getElementById("exportPng"),
      addWall: document.getElementById("addWall"),
      refreshDrawing: document.getElementById("refreshDrawing"),
      resetWall: document.getElementById("resetWall"),
      resetAll: document.getElementById("resetAll"),
      loadExample: document.getElementById("loadExample"),
    };

    let orientation = "horizontal";
    let defaultHoleMode = "4";
    let defaultTwoHoleDirection = "horizontal";
    let selectedPanel = null;
    let activeWall = 0;
    let walls = [{ ...defaultWall }];

    function value(id) {
      return Math.max(Number(els[id].value || 0), 0);
    }

    function panelKey(row, col) {
      return `${row}:${col}`;
    }

    function ensureWallState(wall) {
      if (!wall.holeOverrides || typeof wall.holeOverrides !== "object") {
        wall.holeOverrides = {};
      }
      return wall;
    }

    function getPanelOverride(wall, panel) {
      ensureWallState(wall);
      return wall.holeOverrides[panelKey(panel.row, panel.col)] || {};
    }

    function setDefaultHoleMode(mode) {
      defaultHoleMode = String(mode);
      [els.holeMode2, els.holeMode4, els.holeMode6].forEach((button) => {
        button.classList.toggle("active", button.id === `holeMode${defaultHoleMode}`);
      });
      updateDefaultTwoHoleControls();
      draw();
    }

    function setDefaultTwoHoleDirection(direction) {
      defaultTwoHoleDirection = direction === "vertical" ? "vertical" : "horizontal";
      updateDefaultTwoHoleControls();
      draw();
    }

    function updateDefaultTwoHoleControls() {
      const disabled = els.noHole.checked || defaultHoleMode !== "2";
      [els.twoHoleHorizontal, els.twoHoleVertical].forEach((button) => {
        button.disabled = disabled;
      });
      els.twoHoleHorizontal.classList.toggle("active", defaultTwoHoleDirection === "horizontal");
      els.twoHoleVertical.classList.toggle("active", defaultTwoHoleDirection === "vertical");
    }

    function panelEffectiveMode(override) {
      return override.mode && override.mode !== "default" ? override.mode : defaultHoleMode;
    }

    function panelEffectiveTwoHoleDirection(override) {
      return override.twoHoleDirection && override.twoHoleDirection !== "default"
        ? override.twoHoleDirection
        : defaultTwoHoleDirection;
    }

    function updatePanelTwoHoleDirectionState() {
      const mode = els.panelHoleMode.value === "default" ? defaultHoleMode : els.panelHoleMode.value;
      const isTwoHole = mode === "2";
      els.panelTwoHoleDirectionField.style.display = isTwoHole ? "" : "none";
      els.panelTwoHoleDirection.disabled = !isTwoHole;
    }

    function closePanelEditor() {
      els.panelHoleEditor.hidden = true;
    }

    function positionPanelEditor(anchorRect) {
      const editor = els.panelHoleEditor;
      editor.hidden = false;
      const gap = 12;
      const width = editor.offsetWidth || 280;
      const height = editor.offsetHeight || 170;
      let left = anchorRect.right + gap;
      let top = anchorRect.top + Math.min(24, Math.max(0, anchorRect.height / 2 - 24));
      if (left + width > window.innerWidth - 12) {
        left = anchorRect.left - width - gap;
      }
      if (left < 12) {
        left = Math.min(window.innerWidth - width - 12, 12);
      }
      if (top + height > window.innerHeight - 12) {
        top = window.innerHeight - height - 12;
      }
      if (top < 12) top = 12;
      editor.style.left = `${Math.round(left)}px`;
      editor.style.top = `${Math.round(top)}px`;
    }

    function updatePanelEditor(anchorRect = null) {
      if (!selectedPanel || els.noHole.checked) {
        closePanelEditor();
        return;
      }
      const wall = walls[selectedPanel.wallIndex];
      const data = layout(wall);
      const panel = data.panels[selectedPanel.panelIndex];
      if (!wall || !panel) {
        selectedPanel = null;
        closePanelEditor();
        return;
      }
      const override = getPanelOverride(wall, panel);
      els.panelHoleTitle.textContent = `${wall.name} 第 ${selectedPanel.panelIndex + 1} 块孔位`;
      els.panelHoleMode.value = override.mode || "default";
      els.panelHoleInset.value = override.inset ?? "";
      els.panelTwoHoleDirection.value = override.twoHoleDirection || "default";
      updatePanelTwoHoleDirectionState();
      if (anchorRect) positionPanelEditor(anchorRect);
    }

    function applyPanelOverride() {
      if (!selectedPanel) return;
      const wall = ensureWallState(walls[selectedPanel.wallIndex]);
      const data = layout(wall);
      const panel = data.panels[selectedPanel.panelIndex];
      if (!panel) return;
      const key = panelKey(panel.row, panel.col);
      const mode = els.panelHoleMode.value;
      const insetText = els.panelHoleInset.value.trim();
      const inset = insetText === "" ? null : Math.max(Number(insetText), 0);
      const twoHoleDirection = els.panelTwoHoleDirection.value;
      if (mode === "default" && inset === null && twoHoleDirection === "default") {
        delete wall.holeOverrides[key];
      } else {
        wall.holeOverrides[key] = {
          mode,
          ...(inset === null ? {} : { inset }),
          ...(twoHoleDirection === "default" ? {} : { twoHoleDirection }),
        };
      }
      closePanelEditor();
      draw();
    }

    function dims() {
      const baseW = value("boardW");
      const baseH = value("boardH");
      return orientation === "horizontal"
        ? { boardW: baseW, boardH: baseH }
        : { boardW: baseH, boardH: baseW };
    }

    function distribute(total, unit, mode) {
      const fullCount = Math.floor(total / unit);
      const remainder = total - fullCount * unit;
      const pieces = Array.from({ length: fullCount }, () => unit);
      if (remainder <= 0) return pieces;
      if (mode === "left" || mode === "top") return [remainder, ...pieces];
      if (mode === "center") {
        const halfA = Math.floor(remainder / 2);
        const halfB = remainder - halfA;
        return [halfA, ...pieces, halfB].filter(Boolean);
      }
      return [...pieces, remainder];
    }

    function currentWall() {
      return walls[activeWall];
    }

    function layout(wall = currentWall()) {
      const { boardW, boardH } = dims();
      const wallW = Number(wall.wallW || 0);
      const wallH = Number(wall.wallH || 0);
      if (!Number.isFinite(wallW) || !Number.isFinite(wallH) || wallW <= 0 || wallH <= 0) {
        return { wallW: 0, wallH: 0, boardW, boardH, cols: [], rows: [], panels: [], incomplete: true };
      }
      const cols = distribute(wallW, boardW, els.cutX.value);
      const rows = distribute(wallH, boardH, els.cutY.value);
      const panels = [];
      let y = 0;
      rows.forEach((h, row) => {
        let x = 0;
        cols.forEach((w, col) => {
          panels.push({ x, y, w, h, row, col, full: w === boardW && h === boardH });
          x += w;
        });
        y += h;
      });
      return { wallW, wallH, boardW, boardH, cols, rows, panels };
    }

    function syncWallFromInputs() {
      const wall = currentWall();
      wall.name = els.wallName.value.trim() || `自定义墙 ${activeWall + 1}`;
      const nextW = Number(els.wallW.value);
      const nextH = Number(els.wallH.value);
      wall.wallW = Number.isFinite(nextW) && nextW > 0 ? nextW : "";
      wall.wallH = Number.isFinite(nextH) && nextH > 0 ? nextH : "";
    }

    function syncInputsFromWall() {
      const wall = currentWall();
      els.wallName.value = wall.name;
      els.wallW.value = wall.wallW || "";
      els.wallH.value = wall.wallH || "";
    }

    function renderWallSelect() {
      els.wallSelect.innerHTML = walls.map((wall, index) => {
        const label = wall.wallW && wall.wallH
          ? `${wall.name} ${wall.wallH} x ${wall.wallW}mm`
          : `${wall.name} 待输入尺寸`;
        return `<option value="${index}">${label}</option>`;
      }).join("");
      els.wallSelect.value = String(activeWall);
    }

    function fmtNumber(n) {
      const value = Math.round(Number(n) * 10) / 10;
      return String(value).replace(/\.0$/, "");
    }

    function fmt(n) {
      return `${fmtNumber(n)}mm`;
    }

    function fmtBoardSize(w, h) {
      return `${fmtNumber(w)}*${fmt(h)}`;
    }

    function summarize(panels) {
      const map = new Map();
      panels.forEach((p) => {
        const key = `${p.w} x ${p.h}`;
        const item = map.get(key) || { w: p.w, h: p.h, count: 0 };
        item.count += 1;
        map.set(key, item);
      });
      return Array.from(map.values()).sort((a, b) => (b.w * b.h) - (a.w * a.h));
    }

    function allWallPanels() {
      return walls.flatMap((wall) => layout(wall).panels.map((panel) => ({
        w: panel.w,
        h: panel.h,
      })));
    }

    function rawSheetPlan() {
      const rawW = Math.max(value("rawW"), 1);
      const rawH = Math.max(value("rawH"), 1);
      const allowRotate = els.allowRotate.checked;
      const basePieces = allWallPanels()
        .map((panel, index) => ({ ...panel, id: index + 1 }))
        .sort((a, b) => Math.max(b.w, b.h) - Math.max(a.w, a.h) || (b.w * b.h) - (a.w * a.h));

      function solve(canRotate) {
        const sheets = [];
        const impossible = [];

        function orientations(piece) {
          const base = [{ w: piece.w, h: piece.h }];
          if (canRotate && piece.w !== piece.h) base.push({ w: piece.h, h: piece.w });
          return base;
        }

        function canFitAny(piece) {
          return orientations(piece).some((item) => item.w <= rawW && item.h <= rawH);
        }

        function addToSheet(sheet, piece) {
          let best = null;
          orientations(piece).forEach((item) => {
            sheet.shelves.forEach((shelf, shelfIndex) => {
              if (item.h <= shelf.h && shelf.usedW + item.w <= rawW) {
                const waste = (shelf.h - item.h) * item.w + (rawW - shelf.usedW - item.w);
                if (!best || waste < best.waste) best = { item, shelfIndex, waste };
              }
            });

            if (sheet.usedH + item.h <= rawH) {
              const waste = rawW - item.w + rawH - sheet.usedH - item.h;
              if (!best || waste < best.waste) best = { item, shelfIndex: -1, waste };
            }
          });

          if (!best) return false;

          const placed = {
            w: best.item.w,
            h: best.item.h,
            originalW: piece.w,
            originalH: piece.h,
          };

          if (best.shelfIndex >= 0) {
            const shelf = sheet.shelves[best.shelfIndex];
            placed.x = shelf.usedW;
            placed.y = shelf.y;
            shelf.usedW += best.item.w;
            shelf.pieces.push(placed);
          } else {
            const shelf = {
              y: sheet.usedH,
              h: best.item.h,
              usedW: best.item.w,
              pieces: [placed],
            };
            placed.x = 0;
            placed.y = shelf.y;
            sheet.shelves.push(shelf);
            sheet.usedH += best.item.h;
          }

          sheet.pieces.push(placed);
          return true;
        }

        basePieces.forEach((piece) => {
          if (!canFitAny(piece)) {
            impossible.push(piece);
            return;
          }

          const placed = sheets.some((sheet) => addToSheet(sheet, piece));
          if (!placed) {
            const sheet = { usedH: 0, shelves: [], pieces: [] };
            addToSheet(sheet, piece);
            sheets.push(sheet);
          }
        });

        return { rawW, rawH, sheets, impossible };
      }

      if (!allowRotate) return solve(false);

      const straight = solve(false);
      const rotated = solve(true);
      if (rotated.impossible.length !== straight.impossible.length) {
        return rotated.impossible.length < straight.impossible.length ? rotated : straight;
      }
      return rotated.sheets.length < straight.sheets.length ? rotated : straight;
    }

    function describePieces(pieces) {
      const map = new Map();
      pieces.forEach((piece) => {
        const key = `${piece.originalW} x ${piece.originalH}`;
        const item = map.get(key) || { w: piece.originalW, h: piece.originalH, count: 0 };
        item.count += 1;
        map.set(key, item);
      });
      return Array.from(map.values())
        .sort((a, b) => (b.w * b.h) - (a.w * a.h))
        .map((item) => `${fmt(item.w)} x ${fmt(item.h)} × ${item.count}`)
        .join("，");
    }

    function el(name, attrs = {}, children = []) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attrs).forEach(([k, v]) => node.setAttribute(k, v));
      children.forEach((child) => node.appendChild(child));
      return node;
    }

    function addText(group, text, x, y, attrs = {}) {
      const node = el("text", {
        x,
        y,
        "font-size": 13,
        "font-family": "Arial, PingFang SC, Microsoft YaHei, sans-serif",
        fill: "#202520",
        ...attrs,
      });
      node.textContent = text;
      group.appendChild(node);
      return node;
    }

    function holePointsForPanel(panel, wall, globalNoHole, holeD, defaultInset) {
      if (globalNoHole) return [];
      const override = getPanelOverride(wall, panel);
      const mode = panelEffectiveMode(override);
      if (mode === "none") return [];
      const twoHoleDirection = panelEffectiveTwoHoleDirection(override);
      const inset = Math.max(Number(override.inset ?? defaultInset), 0);
      const safe = ([hx, hy]) => (
        hx > holeD / 2 &&
        hy > holeD / 2 &&
        hx < panel.w - holeD / 2 &&
        hy < panel.h - holeD / 2
      );
      const midX = panel.w / 2;
      const midY = panel.h / 2;
      let points = [];
      if (mode === "2") {
        points = twoHoleDirection === "vertical"
          ? [
              [midX, inset],
              [midX, panel.h - inset],
            ]
          : [
              [inset, midY],
              [panel.w - inset, midY],
            ];
      } else if (mode === "6") {
        points = [
          [inset, inset],
          [midX, inset],
          [panel.w - inset, inset],
          [inset, panel.h - inset],
          [midX, panel.h - inset],
          [panel.w - inset, panel.h - inset],
        ];
      } else {
        points = [
          [inset, inset],
          [panel.w - inset, inset],
          [inset, panel.h - inset],
          [panel.w - inset, panel.h - inset],
        ];
      }
      return points.filter(safe);
    }

      if (mode === "none") return "不开孔";
      return "4孔";

    let copyRegions = [];
    let transparentWatermarkPromise = null;

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function transparentWatermark() {
      if (transparentWatermarkPromise) return transparentWatermarkPromise;
      transparentWatermarkPromise = loadImage(watermarkSource).then((img) => {
        const canvas = document.createElement("canvas");
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
          const lum = (data[i] + data[i + 1] + data[i + 2]) / 3;
          if (lum < 36) {
            data[i + 3] = 0;
          } else {
            data[i] = 255;
            data[i + 1] = 255;
            data[i + 2] = 255;
            data[i + 3] = Math.min(175, Math.max(0, (lum - 36) * 0.82));
          }
        }
        ctx.putImageData(imageData, 0, 0);
        return canvas;
      });
      return transparentWatermarkPromise;
    }

    function showCopyNotice(message) {
      let notice = document.querySelector(".copy-notice");
      if (!notice) {
        notice = document.createElement("div");
        notice.className = "copy-notice";
        Object.assign(notice.style, {
          position: "fixed",
          right: "22px",
          bottom: "22px",
          zIndex: "9999",
          background: "#1f2522",
          color: "#ffffff",
          padding: "10px 15px",
          borderRadius: "999px",
          fontSize: "14px",
          fontWeight: "700",
          letterSpacing: "0",
          boxShadow: "0 12px 30px rgba(31, 37, 34, .24)",
          opacity: "0",
          transform: "translateY(8px)",
          transition: "opacity .18s ease, transform .18s ease",
          pointerEvents: "none",
        });
        document.body.appendChild(notice);
      }
      notice.textContent = message;
      notice.style.opacity = "1";
      notice.style.transform = "translateY(0)";
      clearTimeout(showCopyNotice.timer);
      showCopyNotice.timer = setTimeout(() => {
        notice.style.opacity = "0";
        notice.style.transform = "translateY(8px)";
      }, 1400);
    }

    async function copyWallImage(index) {
      const region = copyRegions[index];
      if (!region) return;
      const source = new XMLSerializer().serializeToString(els.drawing);
      const url = URL.createObjectURL(new Blob([source], { type: "image/svg+xml;charset=utf-8" }));
      const img = await loadImage(url);
      URL.revokeObjectURL(url);

      const scaleFactor = 2;
      const canvas = document.createElement("canvas");
      canvas.width = Math.ceil(region.w * scaleFactor);
      canvas.height = Math.ceil(region.h * scaleFactor);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#f9f6ef";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, region.x, region.y, region.w, region.h, 0, 0, canvas.width, canvas.height);

      const watermark = await transparentWatermark();
      const panelX = (region.panelX - region.x) * scaleFactor;
      const panelY = (region.panelY - region.y) * scaleFactor;
      const panelW = region.panelW * scaleFactor;
      const panelH = region.panelH * scaleFactor;
      const wmW = panelW;
      const wmH = wmW * (watermark.height / watermark.width);
      ctx.save();
      ctx.rect(panelX, panelY, panelW, panelH);
      ctx.clip();
      ctx.globalAlpha = 0.82;
      ctx.drawImage(watermark, panelX, panelY + panelH / 2 - wmH / 2, wmW, wmH);
      ctx.restore();

      canvas.toBlob(async (blob) => {
        if (!blob) {
          showCopyNotice("复制失败，请重试");
          return;
        }
        const fileName = `panel-wall-${index + 1}.png`;
        try {
          if (navigator.clipboard && window.ClipboardItem) {
            await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
            showCopyNotice("复制成功");
            return;
          }
        } catch (error) {
          console.warn("Clipboard copy failed, downloading instead", error);
        }
        download(fileName, URL.createObjectURL(blob));
        showCopyNotice("已下载图片");
      }, "image/png");
    }

    function draw() {
      const layouts = walls.map((wall) => ({ wall, data: layout(wall) }));
      const noHole = els.noHole.checked;
      els.holeD.disabled = noHole;
      els.holeInset.disabled = noHole;
      [els.holeMode2, els.holeMode4, els.holeMode6].forEach((button) => {
        button.disabled = noHole;
      });
      updateDefaultTwoHoleControls();
      const holeD = noHole ? 0 : Math.max(value("holeD"), 1);
      const inset = noHole ? 0 : value("holeInset");
      const marginX = 96;
      const topMargin = 84;
      const gap = 150;
      const footer = 54;
      const maxW = 1120;
      const maxSingleH = 500;
      const maxWallW = Math.max(...layouts.map((item) => item.data.wallW), 1);
      const maxWallH = Math.max(...layouts.map((item) => item.data.wallH), 1);
      const scale = Math.min(maxW / maxWallW, maxSingleH / maxWallH);
      const svgW = Math.ceil(maxWallW * scale + marginX * 2 + 190);
      const totalDrawH = layouts.reduce((sum, item) => sum + (item.data.incomplete ? 150 : item.data.wallH * scale), 0) + Math.max(0, layouts.length - 1) * gap;
      const svgH = Math.ceil(totalDrawH + topMargin + footer);
      const svg = els.drawing;
      svg.innerHTML = "";
      svg.setAttribute("viewBox", `0 0 ${svgW} ${svgH}`);
      svg.setAttribute("width", svgW);
      svg.setAttribute("height", svgH);
    
      svg.appendChild(el("rect", { x: 0, y: 0, width: svgW, height: svgH, fill: "#f9f6ef" }));
    
      const defs = el("defs");
      const pattern = el("pattern", {
        id: "cement",
        width: 80,
        height: 80,
        patternUnits: "userSpaceOnUse",
      });
      pattern.appendChild(el("rect", { width: 80, height: 80, fill: "#cfccc2" }));
      pattern.appendChild(el("path", {
        d: "M0 20 C20 10, 36 32, 80 16 M5 70 C26 50, 52 78, 80 52",
        stroke: "#b8b4aa",
        "stroke-width": 1,
        fill: "none",
        opacity: .38,
      }));
      defs.appendChild(pattern);
      svg.appendChild(defs);
    
      let offsetY = topMargin;
      copyRegions = [];
      layouts.forEach(({ wall, data }, wallIndex) => {
        const g = el("g", { transform: `translate(${marginX}, ${offsetY})` });
        svg.appendChild(g);
        const rightX = data.wallW * scale;
        const bottomY = data.wallH * scale;

        if (data.incomplete) {
          addText(g, `${wall.name} 待输入墙宽和墙高`, 0, 0, {
            "font-size": 16,
            "font-weight": 800,
            fill: "#202520",
          });
          g.appendChild(el("rect", {
            x: 0,
            y: 18,
            width: 520,
            height: 92,
            rx: 8,
            fill: "#fffaf0",
            stroke: "#d8d2c5",
            "stroke-width": 1.2,
            "stroke-dasharray": "8 6",
          }));
          addText(g, "请输入墙宽和墙高后生成排版图", 22, 72, {
            "font-size": 14,
            fill: "#68716a",
          });
          offsetY += 150;
          return;
        }
    
        addText(g, `${wall.name} ${fmt(data.wallW)} x ${fmt(data.wallH)}`, 0, -48, {
          "font-size": 16,
          "font-weight": 800,
          fill: "#202520",
        });
    
        g.appendChild(el("rect", {
          x: 0,
          y: 0,
          width: rightX,
          height: bottomY,
          fill: "url(#cement)",
          stroke: "#202520",
          "stroke-width": 2,
        }));
    
        data.panels.forEach((p, i) => {
          const x = p.x * scale;
          const y = p.y * scale;
          const w = p.w * scale;
          const h = p.h * scale;
          g.appendChild(el("rect", {
            class: "panel-tile",
            "data-wall-index": wallIndex,
            "data-panel-index": i,
            x,
            y,
            width: w,
            height: h,
            fill: p.full ? "rgba(210,207,197,.52)" : "rgba(202,75,34,.10)",
            stroke: "#202520",
            "stroke-width": 1,
          }));

          if (selectedPanel && selectedPanel.wallIndex === wallIndex && selectedPanel.panelIndex === i) {
            g.appendChild(el("rect", {
              x: x + 2,
              y: y + 2,
              width: Math.max(w - 4, 0),
              height: Math.max(h - 4, 0),
              fill: "none",
              stroke: "#ca4b22",
              "stroke-width": 2,
              "stroke-dasharray": "8 5",
              "pointer-events": "none",
            }));
          }
    
          if (w > 38 && h > 28) {
            addText(g, `${i + 1}`, x + 8, y + 16, {
              "font-size": 10,
              fill: "#68645c",
            });
          }
    
          const holes = holePointsForPanel(p, wall, noHole, holeD, inset);
    
          holes.forEach(([hx, hy]) => {
            g.appendChild(el("circle", {
              cx: x + hx * scale,
              cy: y + hy * scale,
              r: Math.max((holeD / 2) * scale, 2.5),
              fill: "#171917",
              opacity: .86,
            }));
            g.appendChild(el("circle", {
              cx: x + hx * scale - 1,
              cy: y + hy * scale - 1,
              r: Math.max((holeD / 6) * scale, 1),
              fill: "#5a5d56",
              opacity: .45,
            }));
          });
        });
    
        function dimensionRuns(values) {
          const runs = [];
          values.forEach((value) => {
            const last = runs[runs.length - 1];
            if (last && last.value === value) {
              last.count += 1;
              last.total += value;
              return;
            }
            runs.push({ value, count: 1, total: value });
          });
          return runs;
        }

        let labelX = 0;
        dimensionRuns(data.cols).forEach((run) => {
          const centerX = (labelX + run.total / 2) * scale;
          const label = run.count > 1 ? `${run.count}列×${fmt(run.value)}` : fmt(run.value);
          addText(g, label, centerX, -7, {
            "font-size": 13,
            "text-anchor": "middle",
            fill: "#ff4d4d",
          });
          labelX += run.total;
        });

        let labelY = 0;
        dimensionRuns(data.rows).forEach((run) => {
          const centerY = (labelY + run.total / 2) * scale + 5;
          const label = run.count > 1 ? `${run.count}行×${fmt(run.value)}` : fmt(run.value);
          addText(g, label, -10, centerY, {
            "font-size": 13,
            "text-anchor": "end",
            fill: "#ff4d4d",
          });
          labelY += run.total;
        });

        g.appendChild(el("line", { x1: 0, y1: -24, x2: rightX, y2: -24, stroke: "#202520", "stroke-width": 1 }));
        g.appendChild(el("line", { x1: 0, y1: -30, x2: 0, y2: -18, stroke: "#202520", "stroke-width": 1 }));
        g.appendChild(el("line", { x1: rightX, y1: -30, x2: rightX, y2: -18, stroke: "#202520", "stroke-width": 1 }));
        addText(g, `墙宽 ${fmt(data.wallW)}`, rightX / 2, -36, { "text-anchor": "middle", "font-size": 13 });
    
        g.appendChild(el("line", { x1: rightX + 24, y1: 0, x2: rightX + 24, y2: bottomY, stroke: "#202520", "stroke-width": 1 }));
        g.appendChild(el("line", { x1: rightX + 18, y1: 0, x2: rightX + 30, y2: 0, stroke: "#202520", "stroke-width": 1 }));
        g.appendChild(el("line", { x1: rightX + 18, y1: bottomY, x2: rightX + 30, y2: bottomY, stroke: "#202520", "stroke-width": 1 }));
        addText(g, `墙高 ${fmt(data.wallH)}`, rightX + 38, bottomY / 2, {
          "font-size": 13,
          transform: `rotate(90 ${rightX + 38} ${bottomY / 2})`,
          "text-anchor": "middle",
        });
    
        const overrideCount = Object.keys(ensureWallState(wall).holeOverrides).length;
        const holeText = noHole
          ? "不开孔"
          : `${holeModeLabel(defaultHoleMode, defaultTwoHoleDirection)} | 孔 ${fmt(holeD)} | 距边 ${fmt(inset)}${overrideCount ? ` | 单块调整 ${overrideCount} 处` : ""}`;
        const infoText = `板材尺寸：${fmtBoardSize(data.boardW, data.boardH)} | ${holeText} | ${orientation === "horizontal" ? "横向排版" : "竖向排版"}`;
        const infoY = bottomY + 42;
        const infoW = Math.min(rightX, Math.max(390, infoText.length * 8.5 + 28));
        g.appendChild(el("rect", {
          x: 0,
          y: infoY - 27,
          width: infoW,
          height: 28,
          rx: 4,
          fill: "#fffaf0",
          stroke: "#ead9bd",
          "stroke-width": 1,
        }));
        addText(g, infoText, 14, infoY - 7, {
          "font-size": 14,
          "font-weight": 600,
          fill: "#4c554f",
        });

        const buttonX = rightX + 58;
        const buttonY = 18;
        const copyButton = el("g", {
          class: "copy-wall-button",
          "data-wall-index": wallIndex,
          cursor: "pointer",
        });
        copyButton.appendChild(el("rect", {
          x: buttonX,
          y: buttonY,
          width: 96,
          height: 34,
          rx: 17,
          fill: "#fffdf8",
          stroke: "#d8d2c5",
          "stroke-width": 1,
        }));
        addText(copyButton, "复制此图", buttonX + 48, buttonY + 22, {
          "font-size": 14,
          "font-weight": 700,
          "text-anchor": "middle",
          fill: "#9b3b1f",
        });
        g.appendChild(copyButton);

        const cropX = Math.max(0, marginX - 122);
        const cropY = Math.max(0, offsetY - 76);
        const cropRight = marginX + rightX + 56;
        const cropBottom = offsetY + bottomY + 92;
        copyRegions[wallIndex] = {
          x: cropX,
          y: cropY,
          w: cropRight - cropX,
          h: cropBottom - cropY,
          panelX: marginX,
          panelY: offsetY,
          panelW: rightX,
          panelH: bottomY,
        };

        offsetY += bottomY + gap;
      });
    
      const rawPlan = rawSheetPlan();
      const allPanels = layouts.flatMap((item) => item.data.panels);
      const totalFull = allPanels.filter((p) => p.full).length;
      const totalCut = allPanels.length - totalFull;
      els.summary.innerHTML = [
        ["墙面", `${walls.length} 面`],
        ["总板块", `${allPanels.length} 块`],
        ["整板", `${totalFull} 块`],
        ["裁切板", `${totalCut} 块`],
        ["原板合计", `${rawPlan.sheets.length} 张`],
      ].map(([label, val]) => `<div class="metric"><strong>${val}</strong><span>${label}</span></div>`).join("");
    
      els.cutList.innerHTML = layouts.map(({ wall, data }) => {
        const full = data.panels.filter((p) => p.full).length;
        const cut = data.panels.length - full;
        const specs = summarize(data.panels).map((item) => `${fmt(item.w)} x ${fmt(item.h)} × ${item.count}`).join("，");
        return `<tr><td>${wall.name}</td><td>${data.panels.length} 块</td><td>整板 ${full} 块，裁切 ${cut} 块；${specs}</td></tr>`;
      }).join("");
    
      els.allCutList.innerHTML = summarizeAllWalls().map((item) => {
        const note = item.w === layouts[0].data.boardW && item.h === layouts[0].data.boardH ? "整板合计" : "裁切合计";
        return `<tr><td>${fmt(item.w)} x ${fmt(item.h)}</td><td>${item.count}</td><td>${note}</td></tr>`;
      }).join("");
    
      const rawArea = rawPlan.rawW * rawPlan.rawH;
      const rawRows = rawPlan.sheets.map((sheet, index) => {
        const usedArea = sheet.pieces.reduce((sum, piece) => sum + piece.originalW * piece.originalH, 0);
        const usage = `${Math.round((usedArea / rawArea) * 100)}%`;
        return `<tr><td>${fmt(rawPlan.rawW)} x ${fmt(rawPlan.rawH)} 第 ${index + 1} 张</td><td>${describePieces(sheet.pieces)}</td><td>${usage}</td></tr>`;
      });
      rawPlan.impossible.forEach((piece) => {
        rawRows.push(`<tr><td>无法切割</td><td>${fmt(piece.w)} x ${fmt(piece.h)}</td><td>超过原板尺寸</td></tr>`);
      });
      els.rawSheetList.innerHTML = rawRows.join("");
      updatePanelEditor();
    }

    function summarizeAllWalls() {
      const map = new Map();
      allWallPanels().forEach((p) => {
        const key = `${p.w} x ${p.h}`;
        const item = map.get(key) || { w: p.w, h: p.h, count: 0 };
        item.count += 1;
        map.set(key, item);
      });
      return Array.from(map.values()).sort((a, b) => (b.w * b.h) - (a.w * a.h));
    }

    function download(name, href) {
      const a = document.createElement("a");
      a.href = href;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function svgBlobUrl() {
      const source = new XMLSerializer().serializeToString(els.drawing);
      return URL.createObjectURL(new Blob([source], { type: "image/svg+xml;charset=utf-8" }));
    }

    function exportSvg() {
      const name = currentWall().name.replace(/[^\w\u4e00-\u9fa5-]+/g, "-");
      const url = svgBlobUrl();
      download(`panel-layout-${name}.svg`, url);
      URL.revokeObjectURL(url);
    }

    function exportPng() {
      const url = svgBlobUrl();
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = els.drawing.width.baseVal.value;
        canvas.height = els.drawing.height.baseVal.value;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        download("panel-layout.png", canvas.toDataURL("image/png"));
      };
      img.src = url;
    }

    function refresh() {
      renderWallSelect();
      syncInputsFromWall();
      draw();
    }

    function addWall() {
      syncWallFromInputs();
      const next = walls.length + 1;
      walls.push({ name: `自定义墙 ${next}`, wallW: "", wallH: "" });
      activeWall = walls.length - 1;
      selectedPanel = null;
      refresh();
    }

    function resetCurrentWall() {
      walls[activeWall] = { name: `自定义墙 ${activeWall + 1}`, wallW: "", wallH: "" };
      selectedPanel = null;
      refresh();
    }

    function deleteCurrentWall() {
      if (walls.length <= 1) {
        walls = [{ ...defaultWall }];
        activeWall = 0;
        selectedPanel = null;
        refresh();
        return;
      }
      walls.splice(activeWall, 1);
      activeWall = Math.min(activeWall, walls.length - 1);
      selectedPanel = null;
      refresh();
    }

    function resetAllWalls() {
      walls = [{ ...defaultWall }];
      activeWall = 0;
      selectedPanel = null;
      refresh();
    }

    function loadExampleWalls() {
      walls = exampleWalls.map((wall) => ({ ...wall }));
      activeWall = 0;
      selectedPanel = null;
      refresh();
    }

    document.querySelectorAll("input, select").forEach((node) => {
      node.addEventListener("input", () => {
        if (["panelHoleMode", "panelHoleInset", "panelTwoHoleDirection"].includes(node.id)) return;
        if (["wallName", "wallW", "wallH"].includes(node.id)) {
          syncWallFromInputs();
          renderWallSelect();
        }
        draw();
      });
    });

    els.wallSelect.addEventListener("change", () => {
      syncWallFromInputs();
      activeWall = Number(els.wallSelect.value);
      selectedPanel = null;
      syncInputsFromWall();
      renderWallSelect();
      draw();
    });

    els.horizontal.addEventListener("click", () => {
      orientation = "horizontal";
      els.horizontal.classList.add("active");
      els.vertical.classList.remove("active");
      draw();
    });
    els.vertical.addEventListener("click", () => {
      orientation = "vertical";
      els.vertical.classList.add("active");
      els.horizontal.classList.remove("active");
      draw();
    });
    els.holeMode2.addEventListener("click", () => setDefaultHoleMode("2"));
    els.holeMode4.addEventListener("click", () => setDefaultHoleMode("4"));
    els.holeMode6.addEventListener("click", () => setDefaultHoleMode("6"));
    els.twoHoleHorizontal.addEventListener("click", () => setDefaultTwoHoleDirection("horizontal"));
    els.twoHoleVertical.addEventListener("click", () => setDefaultTwoHoleDirection("vertical"));
    els.panelHoleMode.addEventListener("change", updatePanelTwoHoleDirectionState);
    els.panelHoleCancel.addEventListener("click", () => {
      selectedPanel = null;
      closePanelEditor();
      draw();
    });
    els.panelHoleConfirm.addEventListener("click", applyPanelOverride);
    els.exportSvg.addEventListener("click", exportSvg);
    els.exportPng.addEventListener("click", exportPng);
    els.drawing.addEventListener("click", (event) => {
      const button = event.target.closest && event.target.closest(".copy-wall-button");
      if (button) {
        copyWallImage(Number(button.dataset.wallIndex));
        return;
      }
      const tile = event.target.closest && event.target.closest(".panel-tile");
      if (!tile) return;
      selectedPanel = {
        wallIndex: Number(tile.dataset.wallIndex),
        panelIndex: Number(tile.dataset.panelIndex),
      };
      activeWall = selectedPanel.wallIndex;
      syncInputsFromWall();
      renderWallSelect();
      draw();
      updatePanelEditor(tile.getBoundingClientRect());
    });
    els.addWall.addEventListener("click", addWall);
    els.refreshDrawing.addEventListener("click", deleteCurrentWall);
    els.resetWall.addEventListener("click", resetCurrentWall);
    els.resetAll.addEventListener("click", resetAllWalls);
    els.loadExample.addEventListener("click", loadExampleWalls);

    refresh();
  </script>
</body>
</html>
