<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1>整板排版核算器</h1>
        <div class="sub">输入格式示例：318*771=20，表示 318×771mm，数量 20 张。支持换行、空格、中文乘号 ×、英文 x。</div>
      </div>
      <div class="sub printHide">单文件工具，可直接发给别人使用；无需联网。</div>
    </div>

    <div class="grid">
      <div class="card inputCard">
        <label>所需规格 + 数量</label>
        <textarea id="input">318*771=20
318*762=5
248*248=18
399*693=2
399*696=1</textarea>

        <div class="row">
          <div>
            <label>整板宽 mm</label>
            <input id="boardW" type="number" value="1220" />
          </div>
          <div>
            <label>整板高 mm</label>
            <input id="boardH" type="number" value="2440" />
          </div>
        </div>

        <label>是否允许旋转排版</label>
        <select id="rotate">
          <option value="yes" selected>允许旋转</option>
          <option value="no">不允许旋转 / 保持纹理方向</option>
        </select>

        <label>锯缝 / 损耗间距 mm</label>
        <input id="gap" type="number" value="0" min="0" />
        <div class="small">实际开料建议填 2–5mm。填 0 代表理论排版，不计算锯缝。</div>

        <button onclick="run()">开始计算</button>
        <div class="btnRow">
          <button class="secondary" onclick="clearInput()">清空输入</button>
          <button class="secondary" onclick="window.print()">打印 / 导出PDF</button>
        </div>
        <div id="err" class="error"></div>

        <div class="small" style="margin-top:14px;">
          说明：这是快速自动排版工具，适合报价估算和开料前预排。若存在纹理方向、留边、封边、实际刀缝、批次色差等要求，正式开料前仍需人工复核。
        </div>
      </div>

      <div class="card">
        <div id="summary"></div>
        <div id="boards" class="boards"></div>
      </div>
    </div>
  </div>

<script>
function parseInput(text) {
  const rows = text
    .replace(/[×Xx]/g, '*')
    .replace(/[，,；;]/g, '\n')
    .split(/\n|\s{2,}/)
    .map(s => s.trim())
    .filter(Boolean);

  const parsed = [];
  for (const row of rows) {
    const m = row.match(/(\d+(?:\.\d+)?)\s*\*\s*(\d+(?:\.\d+)?)\s*=\s*(\d+)/);
    if (!m) throw new Error('无法识别这一行：' + row + '，请使用 318*771=20 这种格式');
    parsed.push({ w: Number(m[1]), h: Number(m[2]), qty: Number(m[3]), label: `${Number(m[1])}×${Number(m[2])}` });
  }
  if (!parsed.length) throw new Error('请先输入规格和数量');
  return parsed;
}

function expandItems(parsed, gap) {
  const items = [];
  for (const p of parsed) {
    for (let i = 0; i < p.qty; i++) {
      items.push({ w: p.w + gap, h: p.h + gap, rawW: p.w, rawH: p.h, label: p.label });
    }
  }
  items.sort((a,b) => (b.w*b.h) - (a.w*a.h) || Math.max(b.w,b.h) - Math.max(a.w,a.h));
  return items;
}

function intersects(a,b) {
  return !(a.x >= b.x+b.w || a.x+a.w <= b.x || a.y >= b.y+b.h || a.y+a.h <= b.y);
}

function splitFreeRects(freeRects, placed) {
  const out = [];
  for (const r of freeRects) {
    if (!intersects(r, placed)) { out.push(r); continue; }
    if (placed.x > r.x) out.push({ x:r.x, y:r.y, w:placed.x-r.x, h:r.h });
    if (placed.x + placed.w < r.x + r.w) out.push({ x:placed.x+placed.w, y:r.y, w:r.x+r.w-(placed.x+placed.w), h:r.h });
    if (placed.y > r.y) out.push({ x:r.x, y:r.y, w:r.w, h:placed.y-r.y });
    if (placed.y + placed.h < r.y + r.h) out.push({ x:r.x, y:placed.y+placed.h, w:r.w, h:r.y+r.h-(placed.y+placed.h) });
  }
  return pruneFreeRects(out);
}

function contains(a,b) {
  return b.x >= a.x && b.y >= a.y && b.x+b.w <= a.x+a.w && b.y+b.h <= a.y+a.h;
}

function pruneFreeRects(rects) {
  const clean = rects.filter(r => r.w > 0 && r.h > 0);
  const result = [];
  for (let i=0; i<clean.length; i++) {
    let inside = false;
    for (let j=0; j<clean.length; j++) {
      if (i !== j && contains(clean[j], clean[i])) { inside = true; break; }
    }
    if (!inside) result.push(clean[i]);
  }
  return result;
}

function tryPack(items, boardW, boardH, allowRotate, boardCount) {
  const boards = Array.from({length: boardCount}, () => ({ free:[{x:0,y:0,w:boardW,h:boardH}], used:[] }));

  for (const item of items) {
    let best = null;
    for (let bi=0; bi<boards.length; bi++) {
      for (const r of boards[bi].free) {
        const opts = [{w:item.w,h:item.h,rot:false}];
        if (allowRotate && item.w !== item.h) opts.push({w:item.h,h:item.w,rot:true});
        for (const o of opts) {
          if (o.w <= r.w && o.h <= r.h) {
            const areaFit = r.w*r.h - o.w*o.h;
            const shortSide = Math.min(r.w-o.w, r.h-o.h);
            const longSide = Math.max(r.w-o.w, r.h-o.h);
            const score = [areaFit, shortSide, longSide, r.y, r.x];
            if (!best || compareScore(score, best.score) < 0) {
              best = { score, bi, x:r.x, y:r.y, w:o.w, h:o.h, rot:o.rot, item };
            }
          }
        }
      }
    }
    if (!best) return null;
    const placed = { x:best.x, y:best.y, w:best.w, h:best.h, rot:best.rot, item:best.item };
    boards[best.bi].used.push(placed);
    boards[best.bi].free = splitFreeRects(boards[best.bi].free, placed);
  }
  return boards;
}

function compareScore(a,b) {
  for (let i=0; i<a.length; i++) if (a[i] !== b[i]) return a[i] - b[i];
  return 0;
}

function pack(items, boardW, boardH, allowRotate) {
  const totalArea = items.reduce((s,it) => s + it.w*it.h, 0);
  const lower = Math.ceil(totalArea / (boardW*boardH));
  for (let n = lower; n <= items.length; n++) {
    const result = tryPack(items, boardW, boardH, allowRotate, n);
    if (result) return { boards: result, lower };
  }
  return null;
}

function colorFor(label) {
  let hash = 0;
  for (let i=0; i<label.length; i++) hash = label.charCodeAt(i) + ((hash << 5) - hash);
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 65%, 78%)`;
}

function render(parsed, items, packResult, boardW, boardH, gap, allowRotate) {
  const boards = packResult.boards;
  const usedRawArea = parsed.reduce((s,p) => s + p.w*p.h*p.qty, 0);
  const boardArea = boardW*boardH;
  const theoretical = Math.ceil(usedRawArea / boardArea);
  const usage = usedRawArea / (boards.length * boardArea) * 100;
  const totalPieces = parsed.reduce((s,p)=>s+p.qty,0);

  const specRows = parsed.map(p => `
    <tr>
      <td>${p.label}mm</td>
      <td>${p.qty}张</td>
      <td>${(p.w*p.h*p.qty/1000000).toFixed(3)}㎡</td>
    </tr>
  `).join('');

  document.getElementById('summary').innerHTML = `
    <div class="result">
      <div class="metric"><div class="name">实际排版整板</div><div class="num">${boards.length} 张</div></div>
      <div class="metric"><div class="name">面积理论下限</div><div class="num">${theoretical} 张</div></div>
      <div class="metric"><div class="name">总小板数量</div><div class="num">${totalPieces} 张</div></div>
      <div class="metric"><div class="name">整板利用率</div><div class="num">${usage.toFixed(1)}%</div></div>
    </div>
    <table class="table">
      <thead><tr><th>规格</th><th>数量</th><th>面积</th></tr></thead>
      <tbody>${specRows}</tbody>
    </table>
    <div class="warn">
      当前整板：${boardW}×${boardH}mm；旋转排版：${allowRotate ? '允许' : '不允许'}；锯缝/损耗间距：${gap}mm。<br>
      说明：算法会尽量塞板，但不保证全局最优。正式开料前建议按图复核方向、纹理、锯缝和边料要求。
    </div>
  `;

  const boardsEl = document.getElementById('boards');
  boardsEl.innerHTML = '';
  boards.forEach((b, idx) => {
    const usedArea = b.used.reduce((s,p) => s + p.item.rawW*p.item.rawH, 0);
    const util = usedArea / boardArea * 100;
    const pieces = {};
    b.used.forEach(p => pieces[p.item.label] = (pieces[p.item.label] || 0) + 1);
    const list = Object.entries(pieces).map(([k,v]) => `${k}：${v}张`).join('　');

    const svgPieces = b.used.map((p) => {
      const txt = p.rot ? `${p.item.label}↻` : p.item.label;
      const fs = Math.max(18, Math.min(42, Math.min(p.w-gap, p.h-gap) / 4.8));
      return `
        <rect x="${p.x}" y="${p.y}" width="${Math.max(0,p.w-gap)}" height="${Math.max(0,p.h-gap)}" fill="${colorFor(p.item.label)}" stroke="#111" stroke-width="2" />
        <text x="${p.x + Math.max(0,p.w-gap)/2}" y="${p.y + Math.max(0,p.h-gap)/2}" font-size="${fs}" text-anchor="middle" dominant-baseline="middle" fill="#111">${txt}</text>
      `;
    }).join('');

    const box = document.createElement('div');
    box.className = 'boardBox';
    box.innerHTML = `
      <div class="boardTitle"><span>第 ${idx+1} 张整板</span><span>利用率 ${util.toFixed(1)}%</span></div>
      <svg viewBox="0 0 ${boardW} ${boardH}" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="${boardW}" height="${boardH}" fill="none" stroke="#000" stroke-width="4" />
        ${svgPieces}
      </svg>
      <div class="list">${list}</div>
    `;
    boardsEl.appendChild(box);
  });
}

function run() {
  const err = document.getElementById('err');
  err.style.display = 'none';
  try {
    const parsed = parseInput(document.getElementById('input').value);
    const boardW = Number(document.getElementById('boardW').value);
    const boardH = Number(document.getElementById('boardH').value);
    const gap = Number(document.getElementById('gap').value || 0);
    const allowRotate = document.getElementById('rotate').value === 'yes';
    if (!boardW || !boardH) throw new Error('整板尺寸不能为空');
    const items = expandItems(parsed, gap);
    for (const it of items) {
      const fits = (it.w <= boardW && it.h <= boardH) || (allowRotate && it.h <= boardW && it.w <= boardH);
      if (!fits) throw new Error(`${it.label} 加上锯缝后无法放入 ${boardW}×${boardH} 整板`);
    }
    const result = pack(items, boardW, boardH, allowRotate);
    if (!result) throw new Error('未能完成排版，请检查规格或减少锯缝');
    render(parsed, items, result, boardW, boardH, gap, allowRotate);
  } catch(e) {
    err.innerText = e.message;
    err.style.display = 'block';
  }
}

function clearInput() {
  document.getElementById('input').value = '';
  document.getElementById('summary').innerHTML = '';
  document.getElementById('boards').innerHTML = '';
}

run();
</script>
