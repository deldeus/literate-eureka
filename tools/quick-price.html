<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>快速查价</title>
  <style>
    :root { color-scheme: light; --bg:#f5f7f4; --panel:#fff; --ink:#17201b; --muted:#65716a; --line:#d8e0da; --accent:#1f7a52; --soft:#e7f4ed; --gold:#b78324; --shadow:0 16px 42px rgba(22,40,30,.11); }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; color:var(--ink); background:linear-gradient(135deg,rgba(31,122,82,.12),transparent 34%),linear-gradient(225deg,rgba(183,131,36,.11),transparent 36%),var(--bg); }
    main { width:min(1180px,calc(100% - 28px)); margin:0 auto; padding:24px 0 36px; }
    .topbar { display:flex; justify-content:space-between; gap:18px; align-items:end; margin-bottom:16px; }
    h1 { margin:0; font-size:clamp(28px,4vw,44px); line-height:1.12; letter-spacing:0; }
    .subtitle { margin:8px 0 0; color:var(--muted); font-size:14px; line-height:1.6; }
    .pill { flex:0 0 auto; border:1px solid rgba(31,122,82,.26); border-radius:999px; background:rgba(255,255,255,.78); color:var(--accent); padding:8px 13px; font-size:13px; font-weight:850; }
    .panel { background:rgba(255,255,255,.94); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); }
    .search-panel { padding:18px; position:sticky; top:0; z-index:10; }
    label { display:block; margin:0 0 8px; font-size:13px; color:#2f3a34; font-weight:850; }
    .search-wrap { position:relative; }
    input { width:100%; min-height:58px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink); font:inherit; font-size:24px; font-weight:800; padding:12px 16px; outline:none; }
    input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(31,122,82,.13); }
    .suggestions { position:absolute; left:0; right:0; top:calc(100% + 8px); z-index:20; display:none; max-height:340px; overflow:auto; border:1px solid rgba(15,23,42,.14); border-radius:10px; background:#fff; box-shadow:0 18px 38px rgba(15,23,42,.18); padding:6px; }
    .suggestions.show { display:block; }
    .suggestion { width:100%; border:0; border-radius:8px; background:transparent; color:var(--ink); cursor:pointer; font:inherit; text-align:left; padding:11px 12px; display:grid; gap:4px; }
    .suggestion:hover, .suggestion:focus { background:rgba(31,122,82,.1); outline:none; }
    .suggestion strong { font-size:16px; line-height:1.25; }
    .suggestion span { color:var(--muted); font-size:12px; line-height:1.35; }
    .quick-tags { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .tag-btn { border:1px solid rgba(31,122,82,.22); border-radius:999px; background:#fff; color:#145b3d; padding:7px 11px; font:inherit; font-weight:800; cursor:pointer; }
    .tag-btn:hover { background:var(--soft); }
    .tag-btn.dragging { opacity:.45; }
    .results { display:grid; gap:14px; margin-top:16px; }
    .empty { padding:28px; color:var(--muted); font-size:15px; line-height:1.7; }
    .card { border:1px solid var(--line); border-radius:8px; background:#fff; overflow:hidden; }
    .card-head { display:flex; justify-content:space-between; gap:14px; align-items:start; padding:14px 16px; background:#f8fbf8; border-bottom:1px solid var(--line); }
    .card-title { display:grid; gap:4px; }
    .card-title strong { font-size:20px; line-height:1.25; }
    .meta { color:var(--muted); font-size:13px; line-height:1.45; }
    .badge { flex:0 0 auto; border-radius:999px; background:var(--soft); color:#0c5436; padding:6px 10px; font-size:12px; font-weight:900; }
    .price-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; padding:14px; }
    .price-grid.single { grid-template-columns:1fr; }
    .price-row { border:1px solid rgba(31,122,82,.16); border-radius:8px; background:#fbfdfb; padding:12px; display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; align-items:center; }
    .price-row span { color:#2f3a34; font-weight:750; line-height:1.35; }
    .row-main { display:block; color:#22302a; font-weight:900; line-height:1.3; }
    .row-sub { display:block; margin-top:4px; color:var(--muted); font-size:12px; font-weight:650; line-height:1.35; }
    .row-tag { display:inline-flex; align-items:center; border-radius:999px; padding:2px 8px; margin-right:7px; font-size:12px; font-weight:950; line-height:1.25; vertical-align:1px; }
    .row-tag.hard { background:#dff1e8; color:#075536; }
    .row-tag.soft { background:#fff1cc; color:#7a4c00; }
    .sub-price-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:7px; }
    .sub-price { display:inline-flex; align-items:center; gap:5px; border:1px solid rgba(31,122,82,.18); border-radius:999px; background:#fff; padding:4px 8px; color:#5d6962; font-size:12px; font-weight:800; }
    .sub-price strong { color:#7a4c00; font-size:11px; font-weight:950; }
    .sub-price b { color:#0c5436; font-size:18px; line-height:1; }
    .price-row b { color:#0c5436; font-size:22px; white-space:nowrap; text-align:right; }
    .price-row b small { display:block; margin-bottom:2px; color:#7a4c00; font-size:11px; font-weight:950; line-height:1; }
    .note { margin:0; padding:0 14px 14px; color:#6a470f; font-size:13px; line-height:1.6; }
    @media (max-width:760px) { main{width:min(100% - 18px,1180px); padding-top:16px;} .topbar{display:block;} .pill{display:inline-block; margin-top:10px;} .search-panel{padding:14px;} input{font-size:20px; min-height:54px;} .price-grid{grid-template-columns:1fr;} .card-head{display:grid;} .badge{justify-self:start;} }

    /* iPhone-style refinement aligned with the quote module. */
    :root { --bg:#f5f6f8; --panel:#fff; --ink:#1f2937; --muted:#687385; --line:#d9dee7; --accent:#146c94; --soft:#e9f4f8; --gold:#a8842e; --shadow:0 18px 44px rgba(20,36,55,.08); }
    body { background:var(--bg); }
    main { width:min(1180px,calc(100% - 40px)); padding:28px 0 40px; }
    .topbar { align-items:flex-end; margin-bottom:18px; }
    .panel, .card { border-radius:22px; box-shadow:var(--shadow); }
    .search-panel { padding:22px; top:12px; }
    input { min-height:58px; border-radius:18px; border-color:#cfd6e2; font-size:22px; }
    .suggestions { border-radius:18px; padding:8px; }
    .suggestion { min-height:58px; border-radius:16px; padding:13px 14px; }
    .tag-btn { min-height:44px; border-radius:999px; padding:8px 14px; }
    .card-head { padding:18px; border-radius:22px 22px 0 0; }
    .price-grid { gap:12px; padding:16px; }
    .price-row { min-height:72px; border-radius:18px; padding:14px; }
    @media (max-width:760px) { main{width:min(100% - 18px,1180px);} .search-panel{padding:16px;} input{font-size:19px;} }
  </style>
