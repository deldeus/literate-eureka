<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>杰哥工具表合集</title>
  <style>
    :root { color-scheme: light; --bg:#f3f5f7; --ink:#111827; --muted:#64748b; --line:#d8dee8; --panel:#fff; --accent:#d94722; --shadow:0 16px 42px rgba(15,23,42,.12); }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif; }
    .app { min-height:100vh; display:grid; grid-template-columns:168px minmax(0,1fr); }
    .sidebar { position:sticky; top:0; height:100vh; overflow:auto; background:#0d151c; color:#fff; border-right:1px solid rgba(255,255,255,.08); padding:8px; }
    .brand { display:grid; gap:3px; padding:2px 1px 8px; border-bottom:1px solid rgba(255,255,255,.1); margin-bottom:7px; }
    .brand h1 { margin:0; font-size:17px; line-height:1.18; letter-spacing:0; }
    .brand p { display:none; }
    .sort-hint { display:none; }
    .nav { display:grid; gap:6px; }
    .tool-button { width:100%; border:1px solid rgba(255,255,255,.1); border-radius:6px; background:rgba(255,255,255,.045); color:#fff; cursor:pointer; text-align:left; padding:8px 7px; display:grid; grid-template-columns:13px minmax(0,1fr); gap:6px; align-items:center; font:inherit; user-select:none; touch-action:none; }
    .tool-button:hover { background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.22); }
    .tool-button.active { background:#fff; color:#101820; border-color:#fff; }
    .tool-button.dragging { opacity:.45; transform:scale(.985); }
    .tool-button.drag-over { border-color:#ffb199; box-shadow:0 0 0 2px rgba(217,71,34,.35); }
    .drag-handle { color:rgba(255,255,255,.38); font-size:13px; line-height:1; cursor:grab; }
    .tool-button.active .drag-handle { color:#87909b; }
    .tool-button:active .drag-handle { cursor:grabbing; }
    .button-body { display:grid; gap:2px; min-width:0; }
    .button-top { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .button-title { font-size:14px; font-weight:820; line-height:1.22; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tag { display:none; flex:0 0 auto; border-radius:999px; background:rgba(217,71,34,.18); color:#ffd9cf; padding:3px 7px; font-size:11px; font-weight:800; }
    .tool-button.active .tag { background:var(--accent); color:#fff; }
    .button-desc { display:none; color:rgba(255,255,255,.64); font-size:11px; line-height:1.35; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tool-button.active .button-desc { color:#526070; }
    .content { min-width:0; display:grid; grid-template-rows:minmax(0,1fr); min-height:100vh; }
    .topbar { display:none; }
    .current-title { display:grid; gap:3px; min-width:0; }
    .current-title strong { font-size:19px; line-height:1.12; }
    .current-title span { color:var(--muted); font-size:12px; line-height:1.3; }
    .quick-select { min-width:210px; height:34px; border:1px solid var(--line); border-radius:7px; background:#fff; color:var(--ink); padding:0 10px; font:inherit; font-weight:750; }
    .frame-shell { min-height:0; padding:8px; }
    .frame-wrap { height:calc(100vh - 16px); min-height:640px; background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); overflow:hidden; }
    iframe { display:none; width:100%; height:100%; border:0; background:#fff; }
    iframe.active { display:block; }
    @media (max-width:920px) { .app{grid-template-columns:1fr;} .sidebar{position:static;height:auto;padding:8px;} .brand{padding-bottom:7px;margin-bottom:7px;} .brand h1{font-size:18px;} .sort-hint{display:none;} .nav{grid-template-columns:repeat(7,minmax(108px,1fr)); overflow-x:auto; padding-bottom:4px;} .tool-button{min-width:108px;} .button-desc{display:none;} .quick-select{width:100%;} .frame-shell{padding:7px;} .frame-wrap{height:calc(100vh - 122px); min-height:620px;} }
    @media (max-width:560px) { .brand p{display:none;} .current-title strong{font-size:19px;} .frame-wrap{height:calc(100vh - 172px); min-height:560px;} }
  </style>
</head>

      <div class="brand"><h1>杰哥工具表合集</h1><p>八个常用工具整合到一个页面。点左侧按钮或上方下拉框，随时切换到另一个功能。</p></div>
      <p class="sort-hint">按住左侧模块拖动，可以上下调整顺序。</p>

      <section class="frame-shell"><div class="frame-wrap" id="frameWrap"></div></section>
    </main>
  </div>

    const nav = document.getElementById('toolNav');
    const frameWrap = document.getElementById('frameWrap');
    const quickSelect = document.getElementById('quickSelect');
    const currentName = document.getElementById('currentName');
    const currentDesc = document.getElementById('currentDesc');
    const orderKey = 'jiege-tool-order-v5';
    let activeId = null;
    let draggedId = null;
    let tools = restoreOrder(baseTools);

    function decodeBase64Utf8(value) { const binary = atob(value); const bytes = new Uint8Array(binary.length); for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i); return new TextDecoder('utf-8').decode(bytes); }
    function esc(value) { return String(value).replace(/[&<>"']/g, function (ch) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]; }); }
    function restoreOrder(items) { try { const saved = JSON.parse(localStorage.getItem(orderKey) || '[]'); const byId = new Map(items.map(function (item) { return [item.id, item]; })); const ordered = saved.map(function (id) { return byId.get(id); }).filter(Boolean); const rest = items.filter(function (item) { return !saved.includes(item.id); }); return ordered.concat(rest); } catch { return items.slice(); } }
    function saveOrder() { localStorage.setItem(orderKey, JSON.stringify(tools.map(function (tool) { return tool.id; }))); }

    function renderNav() {
      nav.innerHTML = tools.map(function (tool) { return '<button class="tool-button" draggable="true" type="button" data-tool="' + esc(tool.id) + '" title="按住拖动排序"><span class="drag-handle" aria-hidden="true">≡</span><span class="button-body"><span class="button-top"><span class="button-title">' + esc(tool.short) + '</span><span class="tag">' + esc(tool.tag) + '</span></span><span class="button-desc">' + esc(tool.desc) + '</span></span></button>'; }).join('');
      nav.querySelectorAll('.tool-button').forEach(function (button) {
        button.classList.toggle('active', button.dataset.tool === activeId);
        button.addEventListener('click', function () { if (!button.classList.contains('dragging')) activate(button.dataset.tool); });
        button.addEventListener('dragstart', function (event) { draggedId = button.dataset.tool; button.classList.add('dragging'); event.dataTransfer.effectAllowed = 'move'; event.dataTransfer.setData('text/plain', draggedId); });
        button.addEventListener('dragover', function (event) { event.preventDefault(); if (button.dataset.tool !== draggedId) button.classList.add('drag-over'); });
        button.addEventListener('dragleave', function () { button.classList.remove('drag-over'); });
        button.addEventListener('drop', function (event) { event.preventDefault(); button.classList.remove('drag-over'); moveTool(draggedId, button.dataset.tool); });
        button.addEventListener('dragend', function () { button.classList.remove('dragging'); nav.querySelectorAll('.drag-over').forEach(function (item) { item.classList.remove('drag-over'); }); draggedId = null; });
      });
    }

    function renderSelect() {
      quickSelect.innerHTML = tools.map(function (tool) { return '<option value="' + esc(tool.id) + '">' + esc(tool.title) + '</option>'; }).join('');
      if (activeId) quickSelect.value = activeId;
    }

    function moveTool(fromId, toId) {
      if (!fromId || !toId || fromId === toId) return;
      const fromIndex = tools.findIndex(function (tool) { return tool.id === fromId; });
      const toIndex = tools.findIndex(function (tool) { return tool.id === toId; });
      if (fromIndex < 0 || toIndex < 0) return;
      const moved = tools.splice(fromIndex, 1)[0];
      tools.splice(toIndex, 0, moved);
      saveOrder();
      renderNav();
      renderSelect();
    }

    function buildFrames() {
      frameSources.forEach(function (source) { const iframe = document.createElement('iframe'); const tool = baseTools.find(function (item) { return item.id === source.id; }); iframe.id = 'frame-' + source.id; iframe.title = tool.title; iframe.srcdoc = decodeBase64Utf8(source.htmlBase64); frameWrap.appendChild(iframe); });
    }

    function build() {
      buildFrames();
      renderNav();
      renderSelect();
      quickSelect.addEventListener('change', function () { activate(quickSelect.value); });
      const initial = new URLSearchParams(window.location.search).get('tool') || tools[0].id;
      activate(baseTools.some(function (tool) { return tool.id === initial; }) ? initial : tools[0].id);
    }

    function activate(id) {
      const tool = baseTools.find(function (item) { return item.id === id; }) || tools[0];
      activeId = tool.id;
      document.querySelectorAll('.tool-button').forEach(function (button) { button.classList.toggle('active', button.dataset.tool === tool.id); });
      document.querySelectorAll('iframe').forEach(function (frame) { frame.classList.toggle('active', frame.id === 'frame-' + tool.id); });
      quickSelect.value = tool.id; currentName.textContent = tool.title; currentDesc.textContent = tool.desc;
      history.replaceState(null, '', location.pathname + '?tool=' + encodeURIComponent(tool.id));
      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    build();
