<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>杰哥工具表合集</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f5f7;
      --ink: #111827;
      --line: #d8dee8;
      --panel: #fff;
      --sidebar: #0d151c;
      --accent: #d94722;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }
    button, select { font: inherit; }
    .app {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-columns: 168px minmax(0, 1fr);
      overflow: hidden;
    }
    .sidebar {
      height: 100%;
      min-width: 0;
      overflow: auto;
      overscroll-behavior: contain;
      background: var(--sidebar);
      color: #fff;
      border-right: 1px solid rgba(255,255,255,.08);
      padding: 9px;
    }
    .brand {
      padding: 3px 2px 10px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      margin-bottom: 8px;
    }
    .brand h1 { margin: 0; font-size: 17px; line-height: 1.25; letter-spacing: 0; }
    .nav { display: grid; gap: 6px; }
    .tool-button {
      width: 100%;
      min-width: 0;
      min-height: 40px;
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 6px;
      background: rgba(255,255,255,.045);
      color: #fff;
      cursor: pointer;
      text-align: left;
      padding: 8px;
      font-weight: 800;
      line-height: 1.2;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .tool-button.active { background: #fff; color: #101820; border-color: #fff; }
    .button-title { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .content { min-width: 0; min-height: 0; height: 100%; }
    .frame-shell { width: 100%; height: 100%; min-width: 0; min-height: 0; padding: 8px; }
    .frame-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    iframe { display: block; width: 100%; height: 100%; border: 0; background: #fff; }
    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #64748b;
      font-size: 14px;
      background: #fff;
      pointer-events: none;
    }
    .loading.hidden { display: none; }
    @media (max-width: 920px) {
      .app { grid-template-columns: 1fr; grid-template-rows: auto minmax(0, 1fr); }
      .sidebar {
        height: auto;
        overflow: hidden;
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,.1);
        padding: calc(7px + var(--safe-top)) 8px 7px;
      }
      .brand { padding: 0 1px 6px; margin-bottom: 6px; }
      .brand h1 { font-size: 16px; }
      .nav {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
      }
      .nav::-webkit-scrollbar { display: none; }
      .tool-button { flex: 0 0 auto; width: auto; min-width: 92px; min-height: 34px; padding: 7px 10px; text-align: center; font-size: 13px; }
      .frame-shell { padding: 5px; padding-bottom: calc(5px + var(--safe-bottom)); }
      .frame-wrap { border-radius: 6px; }
    }
    @media (max-width: 430px) {
      .sidebar { padding-left: 6px; padding-right: 6px; }
      .brand h1 { font-size: 15px; }
      .tool-button { min-width: 84px; font-size: 12px; padding: 7px 8px; }
      .frame-shell { padding-left: 3px; padding-right: 3px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><h1>杰哥工具表合集</h1></div>
      <nav class="nav" id="toolNav" aria-label="工具列表"></nav>
    </aside>
    <main class="content">
      <section class="frame-shell">
        <div class="frame-wrap">
          <iframe id="toolFrame" title="工具内容" allow="clipboard-read; clipboard-write"></iframe>
          <div class="loading" id="loading">正在加载工具...</div>
        </div>
      </section>
    </main>
  </div>
  <script>
    const tools = [{"id":"order-template","title":"开单模板","short":"开单模板","tag":"开单","desc":"鎏金板每日文字开单模板，快速生成可复制开单内容。"},{"id":"quote-generator","title":"报价单生成器","short":"报价单","tag":"快速报价","desc":"输入产品、规格、数量和费用，自动生成可复制或打印的报价单。"},{"id":"quick-price","title":"快速查价","short":"快速查价","tag":"查底价","desc":"输入产品关键词，快速查看鎏金板、宁波柔岩和混凝土仓各规格底价。"},{"id":"report-template","title":"报备模板","short":"报备模板","tag":"项目报备","desc":"快速填写项目报备信息，生成可复制的报备模板。"},{"id":"hole-1200","title":"1200×600 孔心排版","short":"孔心排版","tag":"孔位图","desc":"快速设置板宽、板高、孔数、孔径和边距，导出 SVG。"},{"id":"freight-gold","title":"鎏金板快速运费提交","short":"鎏金运费","tag":"运费模板","desc":"填写地址、规格和张数，自动生成重量、包装和 DB 模板。"},{"id":"ningbo-weight","title":"宁波重量木箱快速计算","short":"宁波重量","tag":"重量木箱","desc":"搜索产品，选择规格和数量，计算总重及木箱尺寸。"},{"id":"full-board-cut","title":"整板切割计算","short":"整板切割","tag":"切割排版","desc":"输入小板规格数量，自动估算整板用量并生成排版图。"},{"id":"wall-panel","title":"水泥板/混凝土上墙排版","short":"上墙排版","tag":"墙面排版","desc":"多墙面排版、孔位示意、裁切统计，并支持导出 SVG/PNG。"}];
    const toolPaths = {"order-template":"tools/order-template.html","quote-generator":"tools/quote-generator.html","quick-price":"tools/quick-price.html","report-template":"tools/report-template.html","hole-1200":"tools/hole-1200.html","freight-gold":"tools/freight-gold.html","ningbo-weight":"tools/ningbo-weight.html","full-board-cut":"tools/full-board-cut.html","wall-panel":"tools/wall-panel.html"};
    const nav = document.getElementById('toolNav');
    const frame = document.getElementById('toolFrame');
    const loading = document.getElementById('loading');
    let activeId = '';

    function esc(value) {
      return String(value).replace(/[&<>"']/g, function (ch) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
      });
    }

    function renderNav() {
      nav.innerHTML = tools.map(function (tool) {
        return '<button class="tool-button" type="button" data-tool="' + esc(tool.id) + '"><span class="button-title">' + esc(tool.short) + '</span></button>';
      }).join('');
      nav.querySelectorAll('.tool-button').forEach(function (button) {
        button.addEventListener('click', function () { activate(button.dataset.tool); });
      });
    }

    function activate(id) {
      const tool = tools.find(function (item) { return item.id === id; }) || tools[0];
      if (!tool || activeId === tool.id) return;
      activeId = tool.id;
      nav.querySelectorAll('.tool-button').forEach(function (button) {
        button.classList.toggle('active', button.dataset.tool === tool.id);
      });
      loading.classList.remove('hidden');
      frame.title = tool.title;
      frame.src = toolPaths[tool.id];
      try {
        history.replaceState(null, '', location.pathname + '?tool=' + encodeURIComponent(tool.id));
      } catch (error) {}
      const activeButton = nav.querySelector('[data-tool="' + tool.id + '"]');
      if (activeButton) activeButton.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    }

    frame.addEventListener('load', function () { loading.classList.add('hidden'); });
    renderNav();
    const initial = new URLSearchParams(location.search).get('tool') || tools[0].id;
    activate(tools.some(function (tool) { return tool.id === initial; }) ? initial : tools[0].id);
  </script>
</body>
</html>
